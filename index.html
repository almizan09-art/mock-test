<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetZone | Social App</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDoc, updateDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        let currentUser = localStorage.getItem('MeetZoneUser') || "";

        // --- AUTH ---
        window.handleAuth = async function() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if (user.length < 3) return alert("Username invalid!");
            
            try {
                const userRef = doc(db, "users", user);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    if (userSnap.data().password === pass) { loginSuccess(user); }
                    else { alert("Galat Password!"); }
                } else {
                    await setDoc(userRef, { 
                        username: user, password: pass, bio: "New to MeetZone", pfp: "",
                        followersCount: 0, followingCount: 0 
                    });
                    loginSuccess(user);
                }
            } catch (err) { alert("Error: " + err.message); }
        }

        function loginSuccess(user) {
            localStorage.setItem('MeetZoneUser', user);
            location.reload();
        }

        // --- TAB NAVIGATION ---
        window.showTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            const target = document.getElementById(t);
            if(target) target.style.display = 'flex';
            
            if(t === 'home-tab') loadHomeFeed();
            if(t === 'profile-tab') loadProfile();
            if(t === 'search-tab') {
                setTimeout(() => document.getElementById('search-input').focus(), 150);
            }
        }

        // --- PHOTO & POST SYSTEM ---
        window.triggerPfpUpload = () => document.getElementById('pfp-input').click();
        window.openPostModal = () => document.getElementById('post-modal').style.display = 'flex';
        window.closePostModal = () => document.getElementById('post-modal').style.display = 'none';

        window.uploadPfp = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('pfp-loading').innerText = "Uploading...";
            try {
                const storageRef = ref(storage, `profile_pics/${currentUser}`);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);
                await updateDoc(doc(db, "users", currentUser), { pfp: url });
                loadProfile();
            } catch (err) { alert("Upload failed: " + err.message); }
        };

        window.submitPost = async () => {
            const url = document.getElementById('post-url').value.trim();
            const caption = document.getElementById('post-caption').value.trim();
            if(!url) return alert("URL zaroori hai!");
            await addDoc(collection(db, "posts"), {
                username: currentUser, content: url, caption: caption, timestamp: serverTimestamp()
            });
            closePostModal();
            showTab('home-tab');
        };

        // --- FEED & PROFILE LOAD ---
        function loadHomeFeed() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('home-feed');
                feed.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    feed.innerHTML += `
                        <div class="post-card">
                            <div class="post-header"><b>${data.username}</b></div>
                            <img src="${data.content}" class="post-media" onerror="this.style.display='none'">
                            <div class="post-info"><b>${data.username}</b> ${data.caption}</div>
                        </div>`;
                });
            });
        }

        async function loadProfile() {
            const snap = await getDoc(doc(db, "users", currentUser));
            const data = snap.data();
            const pfpUrl = data.pfp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            document.getElementById('top-left-pfp').src = pfpUrl;
            document.getElementById('main-pfp').src = pfpUrl;
            document.getElementById('prof-name-title').innerText = data.username;
            document.getElementById('user-display').innerText = data.username;
            document.getElementById('prof-bio').innerText = data.bio || "";
            document.getElementById('pfp-loading').innerText = "";
            
            const q = query(collection(db, "posts"), where("username", "==", currentUser));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('profile-grid');
                grid.innerHTML = "";
                document.getElementById('post-count').innerText = snap.size;
                snap.forEach(d => {
                    grid.innerHTML += `<div class="grid-item"><img src="${d.data().content}"></div>`;
                });
            });
        }

        window.onload = () => { 
            if(currentUser) { 
                document.getElementById('auth').style.display='none'; 
                document.getElementById('app').style.display='block'; 
                showTab('home-tab'); 
            } else {
                document.getElementById('auth').style.display='block';
            }
        }
    </script>
    <style>
        :root { --insta-bg: #000; --text: #fff; --gray: #a8a8a8; --border: #262626; --blue: #0095f6; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background-color: var(--insta-bg); color: var(--text); }
        
        #auth { padding: 80px 30px; text-align: center; display: none; }
        #auth input { width: 100%; padding: 12px; margin: 10px 0; background: #121212; border: 1px solid var(--border); color: white; border-radius: 5px; }
        
        .top-bar { position: sticky; top:0; background: black; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border); z-index: 10; height: 50px; }
        .top-left-profile img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }

        /* Search Styles */
        .search-container { padding: 10px 15px; }
        .search-box { display: flex; align-items: center; background: #262626; border-radius: 8px; padding: 8px 12px; border: 1px solid #363636; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 16px; }

        /* Profile Styles */
        .pfp-wrapper { position: relative; display: inline-block; }
        #main-pfp { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 2px solid #262626; }
        .pfp-add-icon { position: absolute; bottom: 0; right: 0; background: var(--blue); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border: 2px solid black; font-size: 14px; font-weight: bold; }
        .profile-head { padding: 15px; display: flex; align-items: center; gap: 20px; }
        .stats { display: flex; flex: 1; justify-content: space-around; text-align: center; }

        /* Post Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #121212; padding: 20px; border-radius: 12px; width: 100%; border: 1px solid var(--border); }

        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px; background: black; border-top: 0.5px solid var(--border); }
        .nav-item { font-size: 24px; cursor: pointer; }
        .tab-content { display: none; flex-direction: column; padding-bottom: 70px; }
        .post-card { border-bottom: 0.5px solid var(--border); padding-bottom: 15px; }
        .post-media { width: 100%; max-height: 400px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="auth">
        <h1 style="font-style: italic; font-size: 45px;">MeetZone</h1>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="handleAuth()" style="width:100%; padding:12px; background:var(--blue); color:white; border:none; border-radius:5px;">Log In</button>
    </div>

    <div id="app" style="display:none;">
        <div class="top-bar">
            <div class="top-left-profile">
                <img id="top-left-pfp" src="">
                <span id="prof-name-title" style="margin-left:8px; font-weight:700;">MeetZone</span>
            </div>
            <span style="font-size: 28px; cursor: pointer;" onclick="openPostModal()">+</span>
        </div>

        <div id="search-tab" class="tab-content">
            <div class="search-container">
                <div class="search-box">
                    <span style="margin-right:8px;">🔍</span>
                    <input id="search-input" type="text" placeholder="Search">
                </div>
            </div>
            <p style="text-align:center; color:gray; margin-top:20px;">Search friends by ID</p>
        </div>

        <div id="post-modal" class="modal">
            <div class="modal-box">
                <h3 style="margin-bottom:10px;">New Post</h3>
                <input id="post-url" placeholder="Paste Image URL (Image/Video Link)" style="width:100%; padding:10px; margin-bottom:10px; background:black; color:white; border:1px solid #333;">
                <textarea id="post-caption" placeholder="Write a caption..." style="width:100%; background:black; color:white; border:1px solid #333; padding:10px;"></textarea>
                <button onclick="submitPost()" style="width:100%; padding:12px; background:var(--blue); color:white; border:none; margin-top:10px;">Post Now</button>
                <p onclick="closePostModal()" style="text-align:center; color:gray; cursor:pointer; margin-top:15px;">Cancel</p>
            </div>
        </div>

        <div id="home-tab" class="tab-content">
            <div id="home-feed"></div>
        </div>

        <div id="profile-tab" class="tab-content">
            <div class="profile-head">
                <div class="pfp-wrapper" onclick="triggerPfpUpload()">
                    <img id="main-pfp" src="">
                    <div class="pfp-add-icon">+</div>
                    <input type="file" id="pfp-input" style="display:none" accept="image/*" onchange="uploadPfp(event)">
                </div>
                <div class="stats">
                    <div><span class="stat-num" id="post-count">0</span><span class="stat-label">posts</span></div>
                    <div><span class="stat-num">0</span><span class="stat-label">followers</span></div>
                    <div><span class="stat-num">0</span><span class="stat-label">following</span></div>
                </div>
            </div>
            <p id="pfp-loading" style="text-align:center; font-size:12px; color:var(--blue);"></p>
            <div style="padding:0 15px 15px;">
                <b id="user-display"></b><br>
                <span id="prof-bio"></span>
            </div>
            <div class="grid-container" id="profile-grid"></div>
        </div>

        <div class="nav">
            <span class="nav-item" onclick="showTab('home-tab')">🏠</span>
            <span class="nav-item" onclick="showTab('search-tab')">🔍</span>
            <span class="nav-item" onclick="openPostModal()">➕</span>
            <span class="nav-item" onclick="showTab('profile-tab')">👤</span>
            <span class="nav-item" onclick="if(confirm('Logout?')) { localStorage.clear(); location.reload(); }">⚙️</span>
        </div>
    </div>
</body>
</html>
