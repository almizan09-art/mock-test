<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetZone</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = localStorage.getItem('MeetZoneUser') || "";

        // AUTHENTICATION
        window.handleAuth = async function() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (user.length < 3 || pass.length < 4) return alert("Username (min 3) & Password (min 4)!");

            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                if (userSnap.data().password === pass) { loginSuccess(user); }
                else { alert("Galat Password!"); }
            } else {
                await setDoc(userRef, { username: user, password: pass, friends: [], bio: "Hey! I'm using MeetZone", joined: serverTimestamp() });
                loginSuccess(user);
            }
        }

        function loginSuccess(user) {
            localStorage.setItem('MeetZoneUser', user);
            location.reload();
        }

        // TAB NAVIGATION
        window.showTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(t).style.display = 'block';
            if(t === 'search-tab') loadUsers();
            if(t === 'friend-tab') loadFriends();
        }

        // FRIEND SYSTEM
        window.addFriend = async function(friendId) {
            const myRef = doc(db, "users", currentUser);
            await updateDoc(myRef, { friends: arrayUnion(friendId) });
            alert(friendId + " ab aapka friend hai!");
            showTab('friend-tab');
        }

        function loadUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('search-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    if(d.id !== currentUser) {
                        list.innerHTML += `<div class="card">
                            <span>👤 <b>${d.id}</b></span>
                            <button onclick="addFriend('${d.id}')">Add Friend</button>
                        </div>`;
                    }
                });
            });
        }

        function loadFriends() {
            const myRef = doc(db, "users", currentUser);
            onSnapshot(myRef, async (snap) => {
                const list = document.getElementById('friend-list');
                list.innerHTML = "";
                const friends = snap.data().friends || [];
                for(let f of friends) {
                    list.innerHTML += `<div class="card">
                        <span onclick="viewProfile('${f}')">👤 ${f} (View Profile)</span>
                        <button onclick="openChat('${f}')" style="background:#2ecc71">Chat</button>
                    </div>`;
                }
            });
        }

        window.viewProfile = async function(uid) {
            const snap = await getDoc(doc(db, "users", uid));
            const data = snap.data();
            alert(`MeetZone Profile:\nName: ${data.username}\nBio: ${data.bio}`);
        }

        // CHAT & MEDIA
        let activeChat = "";
        window.openChat = (f) => { activeChat = f; showTab('chat-box'); document.getElementById('chat-with').innerText = f; loadMsgs(); }

        window.sendMsg = async () => {
            const txt = document.getElementById('m-input').value;
            const file = document.getElementById('f-input').files[0];
            if(!txt && !file) return;
            const chatId = [currentUser, activeChat].sort().join("_");
            await addDoc(collection(db, "chats", chatId, "messages"), {
                text: txt, sender: currentUser, time: serverTimestamp(), type: file ? "file" : "text"
            });
            document.getElementById('m-input').value = "";
            if(file) alert("File feature: Firebase Billing (UPI) verify karein upload ke liye!");
        }

        function loadMsgs() {
            const chatId = [currentUser, activeChat].sort().join("_");
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("time", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('msgs'); box.innerHTML = "";
                snap.forEach(d => {
                    const isMe = d.data().sender === currentUser;
                    box.innerHTML += `<div class="msg ${isMe?'me':'you'}">${d.data().text}</div>`;
                });
            });
        }

        window.onload = () => { if(currentUser) { document.getElementById('auth').style.display='none'; document.getElementById('app').style.display='block'; showTab('home-tab'); } }
    </script>
    <style>
        :root { --p: #9b59b6; } * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        .card { display: flex; justify-content: space-between; padding: 15px; background: #fff; margin-bottom: 10px; border-radius: 10px; box-shadow: 0 2px 5px #ddd; align-items: center; }
        button { background: var(--p); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        #app { background: #f0f2f5; min-height: 100vh; }
        .nav { position: fixed; bottom:0; width: 100%; display: flex; justify-content: space-around; background: white; padding: 15px; border-top: 1px solid #ddd; }
        .tab-content { padding: 15px; margin-bottom: 70px; }
        .msg { padding: 10px; margin: 5px; border-radius: 10px; max-width: 80%; }
        .me { align-self: flex-end; background: var(--p); color: white; margin-left: auto; }
        .you { align-self: flex-start; background: white; }
    </style>
</head>
<body>
    <div id="auth" style="padding:50px; text-align:center;">
        <h1 style="color:var(--p)">MeetZone</h1>
        <input id="username" placeholder="Username" style="width:100%; padding:10px; margin:10px 0;">
        <input id="password" type="password" placeholder="Password" style="width:100%; padding:10px; margin:10px 0;">
        <button onclick="handleAuth()" style="width:100%">Login / Register</button>
    </div>
    <div id="app" style="display:none;">
        <div style="background:white; padding:15px; font-weight:bold; color:var(--p); font-size:22px; border-bottom:1px solid #ddd;">MeetZone</div>
        
        <div id="home-tab" class="tab-content"><h3>Feed</h3><p>Welcome back! Search friends to start.</p></div>
        <div id="search-tab" class="tab-content" style="display:none;"><h3>Find People</h3><div id="search-list"></div></div>
        <div id="friend-tab" class="tab-content" style="display:none;"><h3>Your Friends</h3><div id="friend-list"></div></div>
        <div id="chat-box" class="tab-content" style="display:none;">
            <h4 id="chat-with">Chat</h4><hr><div id="msgs" style="height:300px; overflow-y:auto; display:flex; flex-direction:column;"></div>
            <input id="m-input" placeholder="Message..."><input type="file" id="f-input" style="font-size:10px">
            <button onclick="sendMsg()">Send</button>
        </div>

        <div class="nav">
            <span onclick="showTab('home-tab')">🏠</span>
            <span onclick="showTab('search-tab')">🔍</span>
            <span onclick="showTab('friend-tab')">👥</span>
            <span onclick="localStorage.clear(); location.reload();">🚪</span>
        </div>
    </div>
</body>
</html>
