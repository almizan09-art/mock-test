<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <style>
        /* CSS for the exact look of your screenshot */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #6a82fb 0%, #fc67fa 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .portal-card {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #2b6df2;
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            color: #777;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #2b6df2;
            border-radius: 12px;
            font-size: 18px;
            outline: none;
            color: #333;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #2b6df2;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(43, 109, 242, 0.3);
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
            background-color: #1a56d1;
        }
    </style>
</head>
<body>

    <div class="portal-card">
        <h1>Student Portal</h1>
        <p>Enter your name to start the session</p>

        <div class="input-group">
            <input type="text" id="studentName" placeholder="Mizan" autocomplete="off">
        </div>

        <button type="button" onclick="startSession()">Start Test Session</button>
    </div>

    <script>
        function startSession() {
            const nameField = document.getElementById('studentName');
            const nameValue = nameField.value.trim();

            if (nameValue === "") {
                alert("Please enter your name first!");
                nameField.focus();
            } else {
                // Name ko browser memory mein save karna (optional)
                localStorage.setItem('currentUser', nameValue);

                // Yahan apne agle page (quiz page) ka naam likhein
                // Example: window.location.href = "quiz.html";
                alert("Session started for: " + nameValue);
                
                // Testing ke liye redirect (ise change kar lena)
                // window.location.href = "next_page.html";
            }
        }
    </script>

</body>
</html>
