<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetZone | Social Chat & Post</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = localStorage.getItem('MeetZoneUser') || "";

        // --- AUTH & INITIALIZATION ---
        window.handleAuth = async function() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if (user.length < 3) return alert("Username invalid!");
            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                if (userSnap.data().password === pass) { loginSuccess(user); }
                else { alert("Galat Password!"); }
            } else {
                await setDoc(userRef, { username: user, password: pass, friends: [], bio: "Hey there! I'm using MeetZone.", pfp: "" });
                loginSuccess(user);
            }
        }

        function loginSuccess(user) {
            localStorage.setItem('MeetZoneUser', user);
            location.reload();
        }

        // --- TAB NAVIGATION ---
        window.showTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(t).style.display = 'flex';
            if(t === 'home-tab') loadPosts();
            if(t === 'profile-tab') loadProfileData();
        }

        // --- POST SYSTEM ---
        window.createPost = async () => {
            const imgUrl = prompt("Enter Image/Video URL:");
            const caption = prompt("Write a caption:");
            if(!imgUrl) return;

            await addDoc(collection(db, "posts"), {
                user: currentUser,
                content: imgUrl,
                caption: caption,
                time: serverTimestamp()
            });
            alert("Post Uploaded!");
            loadPosts();
        }

        function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("time", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('home-feed');
                feed.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    feed.innerHTML += `
                        <div class="post-card">
                            <div class="post-header"><b>${data.user}</b></div>
                            <img src="${data.content}" class="post-img" onerror="this.src='https://placehold.co/600x400?text=Video+or+Link'">
                            <div class="post-meta"><b>${data.user}</b> ${data.caption || ""}</div>
                        </div>`;
                });
            });
        }

        // --- PROFILE EDIT ---
        async function loadProfileData() {
            const snap = await getDoc(doc(db, "users", currentUser));
            const data = snap.data();
            document.getElementById('edit-bio').value = data.bio || "";
            document.getElementById('edit-pfp').value = data.pfp || "";
        }

        window.updateProfile = async () => {
            const newBio = document.getElementById('edit-bio').value;
            const newPfp = document.getElementById('edit-pfp').value;
            await updateDoc(doc(db, "users", currentUser), { bio: newBio, pfp: newPfp });
            alert("Profile Updated!");
        }

        window.onload = () => { if(currentUser) { document.getElementById('auth').style.display='none'; document.getElementById('app').style.display='block'; showTab('home-tab'); } }
    </script>
    <style>
        :root { --insta-blue: #0095f6; --insta-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        
        .top-bar { position: sticky; top: 0; background: white; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #dbdbdb; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px; background: white; border-top: 1px solid #dbdbdb; z-index:100; }
        .nav-item { font-size: 24px; cursor: pointer; }
        
        /* Post Styling */
        .post-card { border-bottom: 1px solid #efefef; margin-bottom: 15px; background: white; }
        .post-header { padding: 10px; display: flex; align-items: center; font-size: 14px; }
        .post-img { width: 100%; max-height: 500px; object-fit: cover; }
        .post-meta { padding: 10px; font-size: 14px; }

        .tab-content { display: none; flex-direction: column; padding-bottom: 80px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #dbdbdb; border-radius: 5px; }
        .btn-blue { background: var(--insta-blue); color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; width: 100%; }
        
        #plus-btn { font-size: 28px; cursor: pointer; color: #262626; }
    </style>
</head>
<body>
    <div id="auth" style="padding:50px 30px; text-align:center; max-width: 400px; margin: auto;">
        <h1 style="font-style: italic; margin-bottom: 30px; font-size: 32px;">MeetZone</h1>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="handleAuth()" class="btn-blue">Log In</button>
    </div>

    <div id="app" style="display:none;">
        <div class="top-bar">
            <span style="font-weight:700; font-size:22px;">MeetZone</span>
            <span id="plus-btn" onclick="createPost()">⊕</span>
        </div>
        
        <div id="home-tab" class="tab-content">
            <div id="home-feed"></div>
        </div>

        <div id="profile-tab" class="tab-content" style="padding: 20px;">
            <h3>Edit Profile</h3>
            <label>Profile Picture URL</label>
            <input id="edit-pfp" placeholder="https://image-link.com/photo.jpg">
            <label>Bio</label>
            <textarea id="edit-bio" placeholder="Tell us about yourself..."></textarea>
            <button onclick="updateProfile()" class="btn-blue">Save Profile</button>
            <button onclick="localStorage.clear(); location.reload();" style="margin-top:20px; background:none; border:none; color:red;">Logout</button>
        </div>

        <div id="search-tab" class="tab-content"><h3 style="padding:20px;">Search coming soon...</h3></div>
        <div id="friend-tab" class="tab-content"><h3 style="padding:20px;">Messages coming soon...</h3></div>

        <div class="nav">
            <span class="nav-item" onclick="showTab('home-tab')">🏠</span>
            <span class="nav-item" onclick="showTab('search-tab')">🔍</span>
            <span class="nav-item" onclick="showTab('friend-tab')">💬</span>
            <span class="nav-item" onclick="showTab('profile-tab')">👤</span>
        </div>
    </div>
</body>
</html>
