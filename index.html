<!DOCTYPE html>
<html>
<head>
<title>Mock Test System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f1f5f9;
}

/* HEADER */
.header{
  background:#0f172a;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  font-size:18px;
}

/* MAIN */
.container{
  display:flex;
  height:90vh;
}

/* LEFT */
.left{
  width:70%;
  padding:30px;
}

/* QUESTION CARD */
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* OPTIONS */
.option{
  background:#f8fafc;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  cursor:pointer;
  border:1px solid #ccc;
  transition:0.3s;
}

.option:hover{
  background:#e2e8f0;
}

.selected{
  background:#22c55e;
  color:white;
}

/* BUTTONS */
button{
  padding:10px 20px;
  margin:10px 5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#2563eb;
  color:white;
}

button:hover{
  background:#1d4ed8;
}

/* RIGHT PANEL */
.right{
  width:30%;
  background:#e2e8f0;
  padding:20px;
}

/* PALETTE */
.palette{
  display:flex;
  flex-wrap:wrap;
}

.palette div{
  width:40px;
  height:40px;
  margin:5px;
  background:#64748b;
  text-align:center;
  line-height:40px;
  cursor:pointer;
  color:white;
  border-radius:5px;
}

.answered{
  background:#22c55e;
}

/* LOGIN */
.center{
  text-align:center;
  margin-top:100px;
}

input{
  padding:10px;
  width:200px;
}

.hidden{display:none;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
<h2>Start Mock Test</h2>
<input id="name" placeholder="Enter Name"><br><br>
<button onclick="login()">Start Test</button>
</div>

<!-- SUBJECT -->
<div id="subject" class="center hidden">
<h2>Select Subject</h2>
<button onclick="start('phy')">Physics</button>
<button onclick="start('chem')">Chemistry</button>
<button onclick="start('bio')">Biology</button>
</div>

<!-- TEST -->
<div id="test" class="hidden">

<div class="header">
<div id="user"></div>
<div id="timer">Time: 600</div>
</div>

<div class="container">

<div class="left">
<div class="card">
<h3 id="q"></h3>
<div id="options"></div>

<div style="text-align:center;">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="submit()">Submit</button>
</div>
</div>
</div>

<div class="right">
<h3>Questions</h3>
<div id="palette" class="palette"></div>
</div>

</div>
</div>

<h2 id="result" style="text-align:center;"></h2>

<script>

let user="";
let qIndex=0;
let answers=[];
let questions=[];
let time=600;

function login(){
user=document.getElementById("name").value;
if(user==""){alert("Enter name");return;}
document.getElementById("login").classList.add("hidden");
document.getElementById("subject").classList.remove("hidden");
}

const data={
phy:[
{q:"SI unit of resistance?",o:["Ampere","Volt","Ohm","Watt"],a:2},
{q:"Speed of light max in?",o:["Glass","Water","Vacuum","Air"],a:2}
],
chem:[
{q:"Unit of molarity?",o:["Mol/L","Mol/kg","g/L","None"],a:0}
],
bio:[
{q:"Double fertilization occurs in?",o:["Algae","Bryophytes","Angiosperms","Gymnosperms"],a:2}
]
};

function start(sub){
questions=data[sub];
document.getElementById("subject").classList.add("hidden");
document.getElementById("test").classList.remove("hidden");
document.getElementById("user").innerText="User: "+user;
createPalette();
loadQ();
}

function loadQ(){
let q=questions[qIndex];
document.getElementById("q").innerText=(qIndex+1)+". "+q.q;

let html="";
q.o.forEach((opt,i)=>{
let sel=answers[qIndex]==i?"selected":"";
html+=`<div class="option ${sel}" onclick="select(${i})">${opt}</div>`;
});
document.getElementById("options").innerHTML=html;
updatePalette();
}

function select(i){
answers[qIndex]=i;
loadQ();
}

function next(){ if(qIndex<questions.length-1){qIndex++;loadQ();}}
function prev(){ if(qIndex>0){qIndex--;loadQ();}}

function createPalette(){
let html="";
questions.forEach((_,i)=>{
html+=`<div id="p${i}" onclick="jump(${i})">${i+1}</div>`;
});
document.getElementById("palette").innerHTML=html;
}

function updatePalette(){
questions.forEach((_,i)=>{
let box=document.getElementById("p"+i);
if(answers[i]!=undefined){
box.classList.add("answered");
}
});
}

function jump(i){qIndex=i;loadQ();}

function submit(){
let score=0;
questions.forEach((q,i)=>{
if(answers[i]==q.a) score++;
});
document.getElementById("test").classList.add("hidden");
document.getElementById("result").innerText=
user+" Score: "+score+"/"+questions.length;
}

setInterval(()=>{
time--;
document.getElementById("timer").innerText="Time: "+time;
if(time<=0) submit();
},1000);

</script>

</body>
</html>
