<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Online Exam Portal</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #f8fafc;
            --accent: #10b981;
            --danger: #ef4444;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: var(--text);
        }

        .card {
            background: white; padding: 2.5rem; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 90%; max-width: 600px;
        }

        h2 { color: var(--primary); text-align: center; margin-top: 0; }

        input[type="text"] {
            width: 100%; padding: 15px; margin: 20px 0;
            border: 2px solid #e2e8f0; border-radius: 10px; outline: none;
        }

        button {
            background: var(--primary); color: white; border: none;
            padding: 12px; border-radius: 10px; cursor: pointer;
            font-weight: 600; width: 100%; transition: 0.3s;
        }

        button:hover { background: #1d4ed8; transform: translateY(-2px); }

        .subject-grid { display: grid; gap: 15px; margin-top: 20px; }
        .sub-btn { background: #4b5563; }
        .sub-btn:hover { background: var(--accent); }

        #timer { color: var(--danger); font-weight: bold; font-size: 1.2rem; }
        .question-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .question { margin: 20px 0; font-size: 1.1rem; font-weight: bold; min-height: 60px; }
        .options-container { display: flex; flex-direction: column; gap: 10px; }
        .option-item {
            padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px;
            cursor: pointer; transition: 0.2s;
        }
        .option-item.selected { background: #d1fae5; border-color: #10b981; }

        .nav-btns { display: flex; gap: 10px; margin-top: 20px; }
        .result-box { text-align: center; }
        .score-text { font-size: 2.5rem; color: var(--accent); font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="login-view" class="card">
        <h2>Student Portal</h2>
        <input type="text" id="student-name" placeholder="Enter Full Name">
        <button onclick="goToDashboard()">Start Session</button>
    </div>

    <div id="dashboard-view" class="card" style="display:none;">
        <h2 id="welcome-text">Select Subject</h2>
        <div class="subject-grid">
            <button class="sub-btn" onclick="startTest('Physics')">Physics (20 Questions)</button>
            <button class="sub-btn" disabled style="opacity: 0.5;">Chemistry (Coming Soon)</button>
            <button class="sub-btn" disabled style="opacity: 0.5;">Biology (Coming Soon)</button>
        </div>
    </div>

    <div id="exam-view" class="card" style="display:none;">
        <div class="question-meta">
            <span id="q-count" style="font-weight: bold;">Question 1/20</span>
            <div id="timer">05:00</div>
        </div>
        <hr>
        <div class="question" id="q-text">Loading...</div>
        <div class="options-container" id="options-box"></div>
        
        <div class="nav-btns">
            <button id="next-btn" onclick="nextQuestion()">Next Question</button>
            <button id="submit-btn" onclick="submitExam()" style="display:none; background: var(--accent);">Submit Final Test</button>
        </div>
    </div>

    <div id="result-view" class="card" style="display:none;">
        <div class="result-box">
            <h2>Exam Completed!</h2>
            <p id="res-name"></p>
            <div class="score-text" id="res-score">0 / 20</div>
            <p id="res-percent"></p>
            <button onclick="location.reload()" style="margin-top:20px;">Restart Portal</button>
        </div>
    </div>

    <script>
        let currentQIndex = 0;
        let score = 0;
        let userAnswers = [];
        let timerInterval;
        let timeLeft = 600; // 10 Minutes for 20 questions

        const physicsQuestions = [
            { q: "What is the correct relation between electric field intensity (E) and potential (V)?", a: "B", opts: ["E = dV/dr", "E = -dV/dr", "V = dE/dr", "V = -dE/dr"] },
            { q: "The capacitance of a capacitor does NOT depend on:", a: "D", opts: ["Shape of the plates", "Size of the plates", "Medium between the plates", "Charge on the plates"] },
            { q: "What is the SI unit of resistance?", a: "C", opts: ["Ampere", "Volt", "Ohm (Ω)", "Watt"] },
            { q: "Kirchhoff’s second law (Loop Rule) is based on the conservation of:", a: "C", opts: ["Charge", "Momentum", "Energy", "Mass"] },
            { q: "What is the SI unit of magnetic flux?", a: "B", opts: ["Tesla", "Weber", "Gauss", "Henry"] },
            { q: "Lenz’s Law is based on which principle?", a: "A", opts: ["Conservation of energy", "Conservation of charge", "Conservation of mass", "Conservation of momentum"] },
            { q: "A transformer works on the principle of:", a: "B", opts: ["Self-induction", "Mutual induction", "Eddy currents", "Total internal reflection"] },
            { q: "The speed of light is maximum in:", a: "C", opts: ["Glass", "Water", "Vacuum", "Air"] },
            { q: "What is the formula of Brewster’s Law?", a: "C", opts: ["μ = sin(iₚ)", "μ = cos(iₚ)", "μ = tan(iₚ)", "μ = cot(iₚ)"] },
            { q: "What is the correct formula for De Broglie wavelength?", a: "A", opts: ["λ = h/mv", "λ = hv/m", "λ = m/hv", "λ = hm/v"] },
            { q: "Who proposed the 'Plum Pudding Model' of the atom?", a: "C", opts: ["Rutherford", "Bohr", "J.J. Thomson", "Dalton"] },
            { q: "In a P-type semiconductor, the majority charge carriers are:", a: "B", opts: ["Electrons", "Holes", "Neutrons", "Protons"] },
            { q: "Which electromagnetic wave has the highest frequency?", a: "B", opts: ["UV rays", "Gamma rays", "X-rays", "Radio waves"] },
            { q: "What is the mirror formula?", a: "B", opts: ["1/f = 1/v - 1/u", "1/f = 1/v + 1/u", "f = u + v", "f = uv"] },
            { q: "The shining (brilliance) of a diamond is due to:", a: "C", opts: ["Interference", "Diffraction", "Total internal reflection", "Refraction"] },
            { q: "Who discovered the photoelectric effect?", a: "B", opts: ["Einstein", "Hertz", "Newton", "Maxwell"] },
            { q: "Which series of the hydrogen spectrum lies in the visible region?", a: "B", opts: ["Lyman series", "Balmer series", "Paschen series", "Pfund series"] },
            { q: "What is the Boolean expression of a NOR gate?", a: "C", opts: ["Y = A + B", "Y = A · B", "Y = (A + B)̅", "Y = (A · B)̅"] },
            { q: "Binding energy per nucleon is maximum for:", a: "C", opts: ["Helium", "Uranium", "Iron (Fe)", "Oxygen"] },
            { q: "What is the unit of power of a lens?", a: "B", opts: ["Meter", "Dioptre (D)", "Candela", "Watt"] }
        ];

        function goToDashboard() {
            const name = document.getElementById('student-name').value;
            if (name.trim() === "") return alert("Please enter name!");
            localStorage.setItem('studentName', name);
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('welcome-text').innerText = "Welcome, " + name;
        }

        function startTest(subject) {
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('exam-view').style.display = 'block';
            startTimer();
            displayQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                let min = Math.floor(timeLeft / 60);
                let sec = timeLeft % 60;
                document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if (timeLeft <= 0) { submitExam(); }
                timeLeft--;
            }, 1000);
        }

        function displayQuestion() {
            const currentQ = physicsQuestions[currentQIndex];
            document.getElementById('q-count').innerText = `Question ${currentQIndex + 1}/20`;
            document.getElementById('q-text').innerText = currentQ.q;
            
            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';
            
            currentQ.opts.forEach((opt, index) => {
                const char = String.fromCharCode(65 + index); // A, B, C, D
                const div = document.createElement('div');
                div.className = 'option-item';
                div.innerText = `${char}) ${opt}`;
                div.onclick = () => selectOption(div, char);
                optionsBox.appendChild(div);
            });

            // Show submit button on last question
            if(currentQIndex === physicsQuestions.length - 1) {
                document.getElementById('next-btn').style.display = 'none';
                document.getElementById('submit-btn').style.display = 'block';
            }
        }

        function selectOption(el, char) {
            document.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            userAnswers[currentQIndex] = char;
        }

        function nextQuestion() {
            if(!userAnswers[currentQIndex]) return alert("Please select an answer!");
            currentQIndex++;
            displayQuestion();
        }

        function submitExam() {
            if(!userAnswers[currentQIndex] && timeLeft > 0) return alert("Select answer before submitting!");
            clearInterval(timerInterval);
            
            // Calculate Score
            score = 0;
            physicsQuestions.forEach((q, i) => {
                if(userAnswers[i] === q.a) score++;
            });

            document.getElementById('exam-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            document.getElementById('res-name').innerText = "Student: " + localStorage.getItem('studentName');
            document.getElementById('res-score').innerText = `${score} / 20`;
            document.getElementById('res-percent').innerText = `Success Rate: ${(score/20)*100}%`;
        }
    </script>
</body>
</html>
