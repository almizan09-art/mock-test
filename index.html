<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetZone | Social Profile</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDoc, updateDoc, arrayUnion, where, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = localStorage.getItem('MeetZoneUser') || "";

        // --- AUTH ---
        window.handleAuth = async function() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if (user.length < 3) return alert("Username invalid!");
            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                if (userSnap.data().password === pass) { loginSuccess(user); }
                else { alert("Galat Password!"); }
            } else {
                await setDoc(userRef, { username: user, password: pass, friends: [], bio: "New to MeetZone", pfp: "" });
                loginSuccess(user);
            }
        }

        function loginSuccess(user) {
            localStorage.setItem('MeetZoneUser', user);
            location.reload();
        }

        // --- NAVIGATION ---
        window.showTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(t).style.display = 'flex';
            if(t === 'home-tab') loadHomeFeed();
            if(t === 'profile-tab') loadProfile();
        }

        // --- POSTING SYSTEM ---
        window.openPostModal = () => document.getElementById('post-modal').style.display = 'flex';
        window.closePostModal = () => document.getElementById('post-modal').style.display = 'none';

        window.submitPost = async () => {
            const url = document.getElementById('post-url').value.trim();
            const caption = document.getElementById('post-caption').value.trim();
            if(!url) return alert("URL zaroori hai!");

            await addDoc(collection(db, "posts"), {
                username: currentUser,
                content: url,
                caption: caption,
                timestamp: serverTimestamp()
            });
            
            document.getElementById('post-url').value = "";
            document.getElementById('post-caption').value = "";
            closePostModal();
            showTab('profile-tab');
        }

        // --- LOAD HOME FEED ---
        function loadHomeFeed() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('home-feed');
                feed.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    feed.innerHTML += `
                        <div class="post-card">
                            <div class="post-header"><b>${data.username}</b></div>
                            <img src="${data.content}" class="post-media">
                            <div class="post-info"><b>${data.username}</b> ${data.caption}</div>
                        </div>`;
                });
            });
        }

        // --- PROFILE SYSTEM ---
        async function loadProfile() {
            const snap = await getDoc(doc(db, "users", currentUser));
            const data = snap.data();
            
            // Set Stats & Info
            document.getElementById('prof-name').innerText = data.username;
            document.getElementById('prof-bio').innerText = data.bio || "No bio yet";
            if(data.pfp) document.getElementById('main-pfp').src = data.pfp;

            // Load User Posts in Grid
            const q = query(collection(db, "posts"), where("username", "==", currentUser));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('profile-grid');
                grid.innerHTML = "";
                document.getElementById('post-count').innerText = snap.size;
                snap.forEach(d => {
                    grid.innerHTML += `<div class="grid-item"><img src="${d.data().content}"></div>`;
                });
            });
        }

        window.saveProfile = async () => {
            const bio = prompt("Enter new Biology (Bio):");
            const pfp = prompt("Enter Profile Picture URL:");
            if(bio || pfp) {
                await updateDoc(doc(db, "users", currentUser), { 
                    bio: bio || "MeetZone User", 
                    pfp: pfp || "" 
                });
                loadProfile();
            }
        }

        window.onload = () => { if(currentUser) { document.getElementById('auth').style.display='none'; document.getElementById('app').style.display='block'; showTab('home-tab'); } }
    </script>
    <style>
        :root { --insta-bg: #000; --text: #fff; --gray: #a8a8a8; --border: #262626; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background-color: var(--insta-bg); color: var(--text); }
        
        .top-bar { position: sticky; top:0; background: black; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border); z-index: 10; }
        
        /* Profile Layout */
        .profile-head { padding: 20px 15px; display: flex; align-items: center; gap: 30px; }
        .pfp-container { position: relative; width: 80px; height: 80px; }
        #main-pfp { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
        .stats { display: flex; flex: 1; justify-content: space-around; text-align: center; }
        .stat-num { font-weight: bold; font-size: 18px; display: block; }
        .stat-label { font-size: 13px; color: var(--gray); }
        
        .profile-bio { padding: 0 15px 20px; font-size: 14px; }
        .profile-btns { display: flex; gap: 10px; padding: 0 15px; }
        .edit-btn { flex: 1; background: #363636; border: none; color: white; padding: 8px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* Grid */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 20px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #262626; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #363636; background: #121212; color: white; }

        /* Nav */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px; background: black; border-top: 0.5px solid var(--border); }
        .nav-item { font-size: 24px; cursor: pointer; }
        .tab-content { display: none; flex-direction: column; padding-bottom: 80px; }

        /* Home Post */
        .post-card { margin-bottom: 15px; }
        .post-header { padding: 10px; font-size: 14px; }
        .post-media { width: 100%; }
        .post-info { padding: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="auth" style="padding:100px 30px; text-align:center;">
        <h1 style="font-style: italic; font-size: 40px; margin-bottom: 20px;">MeetZone</h1>
        <input id="username" placeholder="Phone, username or email">
        <input id="password" type="password" placeholder="Password">
        <button onclick="handleAuth()" style="width:100%; padding:12px; background:#0095f6; color:white; border:none; border-radius:8px; font-weight:bold;">Log In</button>
    </div>

    <div id="app" style="display:none;">
        <div class="top-bar">
            <span id="prof-name" style="font-weight:700; font-size:22px;">MeetZone</span>
            <span style="font-size: 30px; cursor: pointer;" onclick="openPostModal()">+</span>
        </div>

        <div id="post-modal" class="modal">
            <div class="modal-box">
                <h3 style="margin-bottom:10px;">New Post</h3>
                <input id="post-url" placeholder="Paste Photo URL">
                <textarea id="post-caption" placeholder="Write a caption..."></textarea>
                <button onclick="submitPost()" style="width:100%; padding:12px; background:#0095f6; color:white; border:none; border-radius:8px;">Share Post</button>
                <p onclick="closePostModal()" style="text-align:center; margin-top:15px; color:gray; cursor:pointer;">Cancel</p>
            </div>
        </div>

        <div id="home-tab" class="tab-content">
            <div id="home-feed"></div>
        </div>

        <div id="profile-tab" class="tab-content">
            <div class="profile-head">
                <div class="pfp-container">
                    <img id="main-pfp" src="https://via.placeholder.com/150">
                </div>
                <div class="stats">
                    <div><span class="stat-num" id="post-count">0</span><span class="stat-label">posts</span></div>
                    <div><span class="stat-num">1,240</span><span class="stat-label">followers</span></div>
                    <div><span class="stat-num">350</span><span class="stat-label">following</span></div>
                </div>
            </div>
            <div class="profile-bio">
                <b id="user-display">User Profile</b><br>
                <span id="prof-bio">Loading biology...</span>
            </div>
            <div class="profile-btns">
                <button class="edit-btn" onclick="saveProfile()">Edit profile</button>
                <button class="edit-btn">Share profile</button>
            </div>
            <div class="grid-container" id="profile-grid">
                </div>
        </div>

        <div id="friend-tab" class="tab-content" style="padding:20px; text-align:center; color:gray;">Chat section here</div>

        <div class="nav">
            <span class="nav-item" onclick="showTab('home-tab')">🏠</span>
            <span class="nav-item" onclick="showTab('friend-tab')">🔍</span>
            <span class="nav-item" onclick="openPostModal()">➕</span>
            <span class="nav-item" onclick="showTab('profile-tab')">👤</span>
            <span class="nav-item" onclick="if(confirm('Logout?')) { localStorage.clear(); location.reload(); }">⚙️</span>
        </div>
    </div>
</body>
</html>
