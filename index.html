<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Online Exam Portal</title>
    <style>
        :root { --primary: #2563eb; --secondary: #f8fafc; --accent: #10b981; --danger: #ef4444; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; color: var(--text); }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 95%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        input[type="text"] { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s; }
        button:hover { background: #1d4ed8; transform: translateY(-2px); }
        .subject-grid { display: grid; gap: 15px; margin-top: 20px; }
        .sub-btn { background: #4b5563; }
        .sub-btn:hover { background: var(--accent); }
        #timer { color: var(--danger); font-weight: bold; font-size: 1.2rem; }
        .question-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .question { margin: 20px 0; font-size: 1.1rem; font-weight: bold; min-height: 60px; }
        .options-container { display: flex; flex-direction: column; gap: 10px; }
        .option-item { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .option-item.selected { background: #d1fae5; border-color: #10b981; }
        .nav-btns { display: flex; gap: 10px; margin-top: 20px; }
        .result-box { text-align: center; }
        .score-text { font-size: 2.5rem; color: var(--accent); font-weight: bold; margin: 10px 0; }
        .review-section { margin-top: 30px; text-align: left; border-top: 2px solid #eee; padding-top: 20px; }
        .review-item { padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #ccc; background: #f9fafb; }
        .review-item.correct { border-left-color: var(--accent); background: #f0fdf4; }
        .review-item.wrong { border-left-color: var(--danger); background: #fef2f2; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        .correct .status-badge { background: var(--accent); color: white; }
        .wrong .status-badge { background: var(--danger); color: white; }
    </style>
</head>
<body>

    <div id="login-view" class="card">
        <h2>Student Portal</h2>
        <input type="text" id="student-name" placeholder="Enter Full Name">
        <button onclick="goToDashboard()">Start Session</button>
    </div>

    <div id="dashboard-view" class="card" style="display:none;">
        <h2 id="welcome-text">Select Subject</h2>
        <div class="subject-grid">
            <button class="sub-btn" onclick="startTest('Physics')">Physics (20 Questions)</button>
            <button class="sub-btn" onclick="startTest('Chemistry')">Chemistry (20 Questions)</button>
            <button class="sub-btn" onclick="startTest('Biology')">Biology (45 Questions)</button>
        </div>
    </div>

    <div id="exam-view" class="card" style="display:none;">
        <div class="question-meta">
            <span id="q-count" style="font-weight: bold;">Question 1</span>
            <div id="timer">10:00</div>
        </div>
        <hr>
        <div class="question" id="q-text">Loading...</div>
        <div class="options-container" id="options-box"></div>
        <div class="nav-btns">
            <button id="next-btn" onclick="nextQuestion()">Next Question</button>
            <button id="submit-btn" onclick="submitExam()" style="display:none; background: var(--accent);">Submit Final Test</button>
        </div>
    </div>

    <div id="result-view" class="card" style="display:none;">
        <div class="result-box">
            <h2>Exam Completed!</h2>
            <p id="res-name"></p>
            <p id="res-subject" style="color: var(--primary); font-weight: bold;"></p>
            <div class="score-text" id="res-score">0 / 0</div>
            <button onclick="location.reload()">Restart Portal</button>
            <div class="review-section"><h3>Answer Review</h3><div id="review-list"></div></div>
        </div>
    </div>

    <script>
        let currentQIndex = 0, score = 0, userAnswers = [], timerInterval, timeLeft = 0, currentSubject = "", currentQuestions = [];

        const questionsData = {
            'Physics': [
                { q: "Relation between E and V?", a: "B", opts: ["E = dV/dr", "E = -dV/dr", "V = dE/dr", "V = -dE/dr"] },
                { q: "Capacitance depends on?", a: "D", opts: ["Shape", "Size", "Medium", "Charge"] }
                // (Baki physics questions yahan add kar sakte hain)
            ],
            'Chemistry': [
                { q: "Unit of Molarity?", a: "A", opts: ["mol/L", "mol/kg", "g/L", "No unit"] }
                // (Baki chemistry questions yahan add kar sakte hain)
            ],
            'Biology': [
                { q: "Which of the following is true for ribosomes?", a: "B", opts: ["Membrane-bound", "Consist of RNA and protein", "Only in eukaryotes", "Synthesize lipids"] },
                { q: "In C₄ plants, initial fixation of CO₂ occurs in:", a: "B", opts: ["Bundle sheath cells", "Mesophyll cells", "Guard cells", "Epidermal cells"] },
                { q: "The oxygen released during photosynthesis comes from:", a: "B", opts: ["CO₂", "H₂O", "Glucose", "Chlorophyll"] },
                { q: "Phase of meiosis for separation of homologous chromosomes?", a: "A", opts: ["Anaphase I", "Anaphase II", "Metaphase I", "Telophase II"] },
                { q: "Nitrogenase is sensitive to:", a: "B", opts: ["Nitrogen", "Oxygen", "Hydrogen", "CO2"] },
                { q: "Non-reducing sugar?", a: "C", opts: ["Glucose", "Fructose", "Sucrose", "Lactose"] },
                { q: "Hormone for apical dominance?", a: "B", opts: ["Cytokinin", "Auxin", "Ethylene", "Gibberellin"] },
                { q: "NOT a function of liver?", a: "C", opts: ["Bile secretion", "Detoxification", "Insulin production", "Glycogen storage"] },
                { q: "Bohr effect is related to:", a: "D", opts: ["O2 binding", "CO2 transport", "pH effect", "All of above"] },
                { q: "Universal donor?", a: "D", opts: ["A", "B", "AB", "O"] },
                { q: "Pacemaker of heart?", a: "B", opts: ["AV node", "SA node", "Bundle of His", "Purkinje fibers"] },
                { q: "Night blindness deficiency?", a: "A", opts: ["Vitamin A", "Vitamin B", "Vitamin C", "Vitamin D"] },
                { q: "Part of nephron for maximum reabsorption?", a: "A", opts: ["PCT", "DCT", "Loop of Henle", "Collecting duct"] },
                { q: "Steroid hormone?", a: "C", opts: ["Insulin", "Adrenaline", "Testosterone", "Oxytocin"] },
                { q: "Synapse is a junction between?", a: "D", opts: ["Two neurons", "Neuron & muscle", "Neuron & gland", "All of these"] },
                { q: "Mendel’s law of independent assortment applies to:", a: "C", opts: ["Linked genes", "Same chromosome", "Different chromosomes", "Identical genes"] },
                { q: "Genetic material in most organisms?", a: "B", opts: ["RNA", "DNA", "Protein", "Lipid"] },
                { q: "Stop codon?", a: "B", opts: ["AUG", "UAA", "UGG", "GCU"] },
                { q: "Crossing over leads to:", a: "B", opts: ["Mutation", "Recombination", "Replication", "Translation"] },
                { q: "Haemophilia is:", a: "C", opts: ["Autosomal dominant", "Autosomal recessive", "X-linked recessive", "Y-linked"] },
                { q: "PCR developed by:", a: "B", opts: ["Watson", "Kary Mullis", "Crick", "Mendel"] },
                { q: "Restriction enzymes from:", a: "C", opts: ["Plants", "Animals", "Bacteria", "Viruses"] },
                { q: "Vector in genetic engineering?", a: "C", opts: ["tRNA", "mRNA", "Plasmid", "Ribosome"] },
                { q: "Penicillin discovered by?", a: "B", opts: ["Pasteur", "Fleming", "Koch", "Jenner"] },
                { q: "Bt toxin produced by:", a: "B", opts: ["Virus", "Bacteria", "Fungi", "Plant"] },
                { q: "Pyramid of energy is always:", a: "B", opts: ["Inverted", "Upright", "Circular", "Irregular"] },
                { q: "Primary consumer?", a: "B", opts: ["Grass", "Cow", "Tiger", "Lion"] },
                { q: "Ozone layer absorbs:", a: "B", opts: ["Infrared", "UV rays", "Visible", "X-rays"] },
                { q: "Biodiversity hotspots have:", a: "B", opts: ["Low diversity", "High diversity", "No species", "Only animals"] },
                { q: "Mutualism interaction:", a: "B", opts: ["One benefits", "Both benefit", "One harmed", "None benefit"] },
                { q: "Organelle for protein packaging?", a: "B", opts: ["ER", "Golgi apparatus", "Lysosome", "Nucleus"] },
                { q: "Site of glycolysis?", a: "B", opts: ["Mitochondria", "Cytoplasm", "Nucleus", "Chloroplast"] },
                { q: "Respiratory rate in adults?", a: "A", opts: ["12–16/min", "20–25/min", "5–10/min", "30–40/min"] },
                { q: "Hormone regulates blood sugar?", a: "B", opts: ["Thyroxine", "Insulin", "Estrogen", "Testosterone"] },
                { q: "NOT a nucleotide base?", a: "D", opts: ["Adenine", "Guanine", "Uracil", "Glucose"] },
                { q: "Pepsin works in:", a: "A", opts: ["Stomach", "Mouth", "Intestine", "Liver"] },
                { q: "Darwin’s theory based on:", a: "B", opts: ["Mutation", "Natural selection", "Artificial selection", "Isolation"] },
                { q: "Biodegradable pollutant?", a: "C", opts: ["Plastic", "Glass", "Paper", "Metal"] },
                { q: "Gas used in photosynthesis?", a: "B", opts: ["O₂", "CO₂", "N₂", "H₂"] },
                { q: "Organ filters blood?", a: "B", opts: ["Liver", "Kidney", "Heart", "Lung"] },
                { q: "Unit of heredity?", a: "B", opts: ["Cell", "Gene", "Chromosome", "DNA"] },
                { q: "Vector-borne disease?", a: "B", opts: ["Tuberculosis", "Malaria", "Cancer", "Diabetes"] },
                { q: "Vitamin for blood clotting?", a: "D", opts: ["A", "B", "C", "K"] },
                { q: "Organ for breathing?", a: "B", opts: ["Kidney", "Lung", "Liver", "Heart"] },
                { q: "Brain part for balance?", a: "B", opts: ["Cerebrum", "Cerebellum", "Medulla", "Hypothalamus"] }
            ]
        };

        function goToDashboard() {
            const name = document.getElementById('student-name').value;
            if (name.trim() === "") return alert("Please enter name!");
            localStorage.setItem('studentName', name);
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('welcome-text').innerText = "Welcome, " + name;
        }

        function startTest(subject) {
            currentSubject = subject;
            currentQuestions = questionsData[subject];
            currentQIndex = 0; score = 0;
            userAnswers = Array(currentQuestions.length).fill(null);
            timeLeft = (subject === 'Biology') ? 1800 : 600; // Bio: 30 Mins, Others: 10 Mins
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('exam-view').style.display = 'block';
            startTimer(); displayQuestion();
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let min = Math.floor(timeLeft / 60), sec = timeLeft % 60;
                document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if (timeLeft <= 0) submitExam();
                timeLeft--;
            }, 1000);
        }

        function displayQuestion() {
            const currentQ = currentQuestions[currentQIndex];
            document.getElementById('q-count').innerText = `Question ${currentQIndex + 1}/${currentQuestions.length}`;
            document.getElementById('q-text').innerText = currentQ.q;
            const box = document.getElementById('options-box'); box.innerHTML = '';
            currentQ.opts.forEach((opt, i) => {
                const char = String.fromCharCode(65 + i);
                const div = document.createElement('div');
                div.className = 'option-item' + (userAnswers[currentQIndex] === char ? ' selected' : '');
                div.innerText = `${char}) ${opt}`;
                div.onclick = () => { document.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected')); div.classList.add('selected'); userAnswers[currentQIndex] = char; };
                box.appendChild(div);
            });
            document.getElementById('next-btn').style.display = (currentQIndex === currentQuestions.length - 1) ? 'none' : 'block';
            document.getElementById('submit-btn').style.display = (currentQIndex === currentQuestions.length - 1) ? 'block' : 'none';
        }

        function nextQuestion() { if(!userAnswers[currentQIndex]) return alert("Select answer!"); currentQIndex++; displayQuestion(); }

        function submitExam() {
            clearInterval(timerInterval); score = 0;
            const list = document.getElementById('review-list'); list.innerHTML = '';
            currentQuestions.forEach((q, i) => {
                const correct = (userAnswers[i] === q.a); if(correct) score++;
                const div = document.createElement('div'); div.className = `review-item ${correct ? 'correct' : 'wrong'}`;
                div.innerHTML = `<span class="status-badge">${correct ? 'CORRECT' : 'WRONG'}</span><p>Q${i+1}: ${q.q}</p><p>Ans: ${userAnswers[i] || 'None'} | Correct: ${q.a}</p>`;
                list.appendChild(div);
            });
            document.getElementById('exam-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            document.getElementById('res-name').innerText = "Student: " + localStorage.getItem('studentName');
            document.getElementById('res-score').innerText = `${score} / ${currentQuestions.length}`;
        }
    </script>
</body>
</html>
