<!DOCTYPE html>
<html>
<head>
<title>Mock Test System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f1f5f9;
}

/* HEADER */
.header{
  background:#1e293b;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

/* MAIN */
.container{
  display:flex;
}

/* LEFT */
.left{
  width:70%;
  padding:20px;
}

/* RIGHT */
.right{
  width:30%;
  background:#e2e8f0;
  padding:15px;
}

.option{
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:5px;
  cursor:pointer;
  border:1px solid gray;
}

.selected{
  background:#22c55e;
  color:white;
}

.palette{
  display:flex;
  flex-wrap:wrap;
}

.palette div{
  width:35px;
  height:35px;
  margin:5px;
  background:gray;
  text-align:center;
  line-height:35px;
  cursor:pointer;
  color:white;
}

.answered{
  background:green;
}

button{
  padding:10px;
  margin:5px;
}

.hidden{display:none;}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" style="text-align:center;margin-top:100px;">
<h2>Start Mock Test</h2>
<input id="name" placeholder="Enter Name"><br><br>
<button onclick="login()">Start</button>
</div>

<!-- SUBJECT -->
<div id="subject" class="hidden" style="text-align:center;margin-top:50px;">
<h2>Select Subject</h2>
<button onclick="start('phy')">Physics</button>
<button onclick="start('chem')">Chemistry</button>
<button onclick="start('bio')">Biology</button>
</div>

<!-- TEST -->
<div id="test" class="hidden">

<div class="header">
<div id="user"></div>
<div id="timer">Time: 600</div>
</div>

<div class="container">

<div class="left">
<h3 id="q"></h3>
<div id="options"></div>

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="submit()">Submit</button>
</div>

<div class="right">
<h3>Questions</h3>
<div id="palette" class="palette"></div>
</div>

</div>
</div>

<h2 id="result" style="text-align:center;"></h2>

<script>

let user="";
let qIndex=0;
let answers=[];
let questions=[];
let time=600;

/* LOGIN */
function login(){
user=document.getElementById("name").value;
if(user==""){alert("Enter name");return;}
document.getElementById("login").classList.add("hidden");
document.getElementById("subject").classList.remove("hidden");
}

/* QUESTIONS */
const data={

phy:[
{q:"Relation between electric field and potential?",o:["E=dV/dr","E=-dV/dr","V=dE/dr","V=-dE/dr"],a:1},
{q:"Capacitance does not depend on?",o:["Shape","Size","Medium","Charge"],a:3},
{q:"SI unit of resistance?",o:["Ampere","Volt","Ohm","Watt"],a:2},
{q:"Loop rule based on?",o:["Charge","Momentum","Energy","Mass"],a:2}
],

chem:[
{q:"Unit of molarity?",o:["Mol/L","Mol/kg","g/L","None"],a:0},
{q:"Total Bravais lattices?",o:["7","14","12","9"],a:1},
{q:"Fuel cell uses?",o:["N2","O2","H2","CO2"],a:2}
],

bio:[
{q:"Double fertilization occurs in?",o:["Algae","Bryophytes","Angiosperms","Gymnosperms"],a:2},
{q:"Fusion of gametes is called?",o:["Pollination","Syngamy","Parthenogenesis","Triple"],a:1},
{q:"Total codons?",o:["16","32","64","20"],a:2}
]

};

/* START */
function start(sub){
questions=data[sub];
document.getElementById("subject").classList.add("hidden");
document.getElementById("test").classList.remove("hidden");
document.getElementById("user").innerText="User: "+user;
createPalette();
loadQ();
}

/* LOAD QUESTION */
function loadQ(){
let q=questions[qIndex];
document.getElementById("q").innerText=(qIndex+1)+". "+q.q;

let html="";
q.o.forEach((opt,i)=>{
let sel=answers[qIndex]==i?"selected":"";
html+=`<div class="option ${sel}" onclick="select(${i})">${opt}</div>`;
});
document.getElementById("options").innerHTML=html;
updatePalette();
}

/* SELECT */
function select(i){
answers[qIndex]=i;
loadQ();
}

/* NAV */
function next(){ if(qIndex<questions.length-1){qIndex++;loadQ();}}
function prev(){ if(qIndex>0){qIndex--;loadQ();}}

/* PALETTE */
function createPalette(){
let html="";
questions.forEach((_,i)=>{
html+=`<div id="p${i}" onclick="jump(${i})">${i+1}</div>`;
});
document.getElementById("palette").innerHTML=html;
}

function updatePalette(){
questions.forEach((_,i)=>{
let box=document.getElementById("p"+i);
if(answers[i]!=undefined){
box.classList.add("answered");
}
});
}

function jump(i){qIndex=i;loadQ();}

/* SUBMIT */
function submit(){
let score=0;
questions.forEach((q,i)=>{
if(answers[i]==q.a) score++;
});
document.getElementById("test").classList.add("hidden");
document.getElementById("result").innerText=
user+" Score: "+score+"/"+questions.length;
}

/* TIMER */
setInterval(()=>{
time--;
document.getElementById("timer").innerText="Time: "+time;
if(time<=0) submit();
},1000);

</script>

</body>
</html>
