<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetZone | Social App</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDoc, updateDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        // Photo upload ke liye Storage import kiya
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        let currentUser = localStorage.getItem('MeetZoneUser') || "";

        // --- AUTH ---
        window.handleAuth = async function() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if (user.length < 3) return alert("Username invalid!");
            
            try {
                const userRef = doc(db, "users", user);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    if (userSnap.data().password === pass) { loginSuccess(user); }
                    else { alert("Galat Password!"); }
                } else {
                    await setDoc(userRef, { 
                        username: user, password: pass, bio: "New to MeetZone", pfp: "",
                        followersCount: 0, followingCount: 0 
                    });
                    loginSuccess(user);
                }
            } catch (err) { alert("Error: " + err.message); }
        }

        function loginSuccess(user) {
            localStorage.setItem('MeetZoneUser', user);
            location.reload();
        }

        // --- PROFILE PHOTO SYSTEM (UPLOAD & DELETE) ---
        window.triggerPfpUpload = () => document.getElementById('pfp-input').click();

        window.uploadPfp = async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const loading = document.getElementById('pfp-loading');
            loading.style.display = 'block';

            try {
                const storageRef = ref(storage, `profile_pics/${currentUser}`);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);
                
                await updateDoc(doc(db, "users", currentUser), { pfp: url });
                loadProfile();
                alert("Profile photo updated!");
            } catch (err) {
                alert("Upload failed: " + err.message);
            } finally {
                loading.style.display = 'none';
            }
        };

        window.deletePfp = async () => {
            if (!confirm("Are you sure you want to remove your profile photo?")) return;
            
            try {
                const storageRef = ref(storage, `profile_pics/${currentUser}`);
                await deleteObject(storageRef);
                await updateDoc(doc(db, "users", currentUser), { pfp: "" });
                loadProfile();
                alert("Photo removed!");
            } catch (err) {
                // Agar file storage me nahi hai par URL db me hai, tab bhi reset kar dena chahiye
                await updateDoc(doc(db, "users", currentUser), { pfp: "" });
                loadProfile();
            }
        };

        // --- TAB NAVIGATION ---
        window.showTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            const target = document.getElementById(t);
            if(target) target.style.display = 'flex';
            
            if(t === 'home-tab') loadHomeFeed();
            if(t === 'profile-tab') loadProfile();
        }

        async function loadProfile() {
            const snap = await getDoc(doc(db, "users", currentUser));
            if(!snap.exists()) return;
            const data = snap.data();
            const defaultPfp = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            const pfpUrl = data.pfp || defaultPfp;
            
            document.getElementById('top-left-pfp').src = pfpUrl;
            document.getElementById('main-pfp').src = pfpUrl;
            document.getElementById('prof-name-title').innerText = data.username;
            document.getElementById('user-display').innerText = data.username;
            document.getElementById('prof-bio').innerText = data.bio || "";
            
            // Delete button tabhi dikhao jab photo real ho
            document.getElementById('del-pfp-btn').style.display = data.pfp ? 'inline-block' : 'none';

            const q = query(collection(db, "posts"), where("username", "==", currentUser));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('profile-grid');
                grid.innerHTML = "";
                document.getElementById('post-count').innerText = snap.size;
                snap.forEach(d => {
                    grid.innerHTML += `<div class="grid-item"><img src="${d.data().content}"></div>`;
                });
            });
        }

        window.onload = () => { 
            if(currentUser) { 
                document.getElementById('auth').style.display='none'; 
                document.getElementById('app').style.display='block'; 
                showTab('home-tab'); 
            } else {
                document.getElementById('auth').style.display='block';
            }
        }
    </script>
    <style>
        :root { --insta-bg: #000; --text: #fff; --gray: #a8a8a8; --border: #262626; --blue: #0095f6; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background-color: var(--insta-bg); color: var(--text); }
        
        #auth { padding: 80px 30px; text-align: center; display: none; }
        #auth input { width: 100%; padding: 12px; margin: 10px 0; background: #121212; border: 1px solid var(--border); color: white; border-radius: 5px; }
        
        .top-bar { position: sticky; top:0; background: black; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border); z-index: 10; }
        .top-left-profile img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }

        /* Profile Photo CSS */
        .pfp-wrapper { position: relative; display: inline-block; }
        #main-pfp { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 2px solid #262626; cursor: pointer; }
        .pfp-add-icon { position: absolute; bottom: 0; right: 0; background: var(--blue); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border: 2px solid black; font-size: 14px; font-weight: bold; pointer-events: none; }
        #pfp-loading { display: none; font-size: 10px; color: var(--blue); margin-top: 5px; }

        .profile-head { padding: 15px; display: flex; align-items: center; gap: 25px; }
        .stats { display: flex; flex: 1; justify-content: space-around; text-align: center; }
        .stat-num { font-weight: bold; font-size: 18px; display: block; }
        .stat-label { font-size: 13px; color: var(--gray); }

        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #111; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        .edit-btn, .del-btn { flex: 1; background: #262626; border: none; color: white; padding: 8px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .del-btn { background: #3d0a0a; color: #ff4d4d; margin-top: 10px; display: none; }

        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px; background: black; border-top: 0.5px solid var(--border); }
        .nav-item { font-size: 24px; cursor: pointer; }
        .tab-content { display: none; flex-direction: column; padding-bottom: 70px; }
    </style>
</head>
<body>

    <div id="auth">
        <h1 style="font-style: italic; font-size: 45px; margin-bottom: 20px;">MeetZone</h1>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="handleAuth()" style="width:100%; padding:12px; background:var(--blue); color:white; border:none; border-radius:5px; font-weight:bold;">Log In</button>
    </div>

    <div id="app" style="display:none;">
        <div class="top-bar">
            <div class="top-left-profile" style="display:flex; align-items:center; gap:10px;">
                <img id="top-left-pfp" src="">
                <span id="prof-name-title" style="font-weight:700; font-size:20px;">MeetZone</span>
            </div>
            <span style="font-size: 28px; cursor: pointer;">+</span>
        </div>

        <div id="home-tab" class="tab-content" style="padding: 20px; text-align: center;">
            <p style="color: gray;">Welcome to your feed!</p>
        </div>

        <div id="profile-tab" class="tab-content">
            <div class="profile-head">
                <div class="pfp-wrapper" onclick="triggerPfpUpload()">
                    <img id="main-pfp" src="">
                    <div class="pfp-add-icon">+</div>
                    <input type="file" id="pfp-input" style="display:none" accept="image/*" onchange="uploadPfp(event)">
                </div>
                <div class="stats">
                    <div><span class="stat-num" id="post-count">0</span><span class="stat-label">posts</span></div>
                    <div><span class="stat-num" id="follower-count">0</span><span class="stat-label">followers</span></div>
                    <div><span class="stat-num" id="following-count">0</span><span class="stat-label">following</span></div>
                </div>
            </div>
            <div id="pfp-loading" style="text-align:center;">Uploading...</div>
            
            <div style="padding: 0 15px 15px;">
                <b id="user-display">username</b><br>
                <span id="prof-bio">biology...</span>
            </div>

            <div style="display:flex; flex-direction:column; gap:5px; padding:0 15px;">
                <div style="display:flex; gap:10px;">
                    <button class="edit-btn" onclick="saveProfile()">Edit profile</button>
                    <button class="edit-btn">Share profile</button>
                </div>
                <button id="del-pfp-btn" class="del-btn" onclick="deletePfp()">Remove Photo</button>
            </div>

            <div class="grid-container" id="profile-grid"></div>
        </div>

        <div class="nav">
            <span class="nav-item" onclick="showTab('home-tab')">🏠</span>
            <span class="nav-item">🔍</span>
            <span class="nav-item">➕</span>
            <span class="nav-item" onclick="showTab('profile-tab')">👤</span>
            <span class="nav-item" onclick="if(confirm('Logout?')) { localStorage.clear(); location.reload(); }">⚙️</span>
        </div>
    </div>
</body>
</html>
