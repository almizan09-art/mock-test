<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetZone | Messaging Update</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDoc, updateDoc, arrayUnion, arrayRemove, where, limit, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = localStorage.getItem('MeetZoneUser') || "";
        let activeChatUser = "";

        // --- NAVIGATION ---
        window.showTab = (t, targetUser = null) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            const target = document.getElementById(t);
            if(target) target.style.display = 'flex';
            
            if(t === 'home-tab') loadHomeFeed();
            if(t === 'profile-tab') loadProfile(targetUser || currentUser);
            if(t === 'search-tab') setupSearch();
        }

        // --- MESSAGE NOTIFICATION LISTENER ---
        function listenForNotifications() {
            if(!currentUser) return;
            const q = query(collection(db, "notifications"), where("to", "==", currentUser));
            onSnapshot(q, (snap) => {
                snap.docChanges().forEach(async (change) => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        // Agar user usi bande se chat nahi kar raha, tabhi alert dikhao
                        if(activeChatUser !== data.from) {
                            showInAppNotification(data.from, data.text);
                        }
                        // Notification handle hone ke baad delete kar do
                        await deleteDoc(doc(db, "notifications", change.doc.id));
                    }
                });
            });
        }

        function showInAppNotification(from, text) {
            const toast = document.getElementById('notification-toast');
            toast.innerHTML = `<b>${from}</b>: ${text}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // --- CHAT SYSTEM ---
        window.openChat = (targetUser) => {
            activeChatUser = targetUser;
            document.getElementById('chat-header-name').innerText = targetUser;
            showTab('chat-tab');
            
            const chatID = [currentUser, targetUser].sort().join("_");
            const q = query(collection(db, "chats", chatID, "messages"), orderBy("timestamp", "asc"));
            
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const side = m.sender === currentUser ? "sent" : "received";
                    box.innerHTML += `<div class="msg ${side}">${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text || !activeChatUser) return;

            const chatID = [currentUser, activeChatUser].sort().join("_");
            
            // Add message to chat
            await addDoc(collection(db, "chats", chatID, "messages"), {
                text: text,
                sender: currentUser,
                timestamp: serverTimestamp()
            });

            // Send notification to friend
            await addDoc(collection(db, "notifications"), {
                to: activeChatUser,
                from: currentUser,
                text: text,
                timestamp: serverTimestamp()
            });

            input.value = "";
        }

        // --- PROFILE LOADING (WITH MESSAGE BUTTON) ---
        async function loadProfile(username) {
            onSnapshot(doc(db, "users", username), (snap) => {
                if(!snap.exists()) return;
                const data = snap.data();
                const isMe = username === currentUser;
                
                document.getElementById('main-pfp').src = data.pfp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                document.getElementById('user-display').innerText = data.username;
                document.getElementById('follower-count').innerText = (data.followers || []).length;
                document.getElementById('following-count').innerText = (data.following || []).length;

                const actionDiv = document.getElementById('profile-action-btn');
                if (isMe) {
                    actionDiv.innerHTML = `<button class="edit-btn">Edit Profile</button>`;
                } else {
                    const amIFollowing = (data.followers || []).includes(currentUser);
                    actionDiv.innerHTML = `
                        <button class="edit-btn ${amIFollowing ? '' : 'follow-blue'}" onclick="toggleFollow('${username}')">
                            ${amIFollowing ? 'Following' : 'Follow'}
                        </button>
                        <button class="edit-btn" onclick="openChat('${username}')" style="margin-top:5px; background:white; color:black;">Message</button>
                    `;
                }
            });
            // ... (load grid logic as before)
        }

        // --- INITIALIZE ---
        window.onload = () => { 
            if(currentUser) {
                showTab('home-tab'); 
                listenForNotifications();
            }
        }
    </script>
    <style>
        :root { --insta-bg: #000; --text: #fff; --gray: #a8a8a8; --border: #262626; --blue: #0095f6; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background-color: var(--insta-bg); color: var(--text); overflow: hidden; }
        
        .tab-content { display: none; flex-direction: column; height: 100vh; padding-bottom: 60px; }
        
        /* Notification Toast */
        #notification-toast { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: var(--blue); color: white; padding: 10px 20px; border-radius: 20px; z-index: 1000; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* Chat UI */
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; }
        .sent { align-self: flex-end; background: var(--blue); color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #262626; color: white; border-bottom-left-radius: 2px; }
        .chat-input-box { display: flex; padding: 10px; background: #121212; border-top: 1px solid var(--border); }
        .chat-input-box input { flex: 1; background: transparent; border: 1px solid #333; color: white; padding: 10px; border-radius: 20px; outline: none; }

        /* Navigation & Buttons */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px; background: black; border-top: 1px solid var(--border); z-index: 100; }
        .edit-btn { width: 100%; background: #363636; color: white; border: none; padding: 8px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .follow-blue { background: var(--blue); }
        .top-bar { padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="notification-toast"></div>

    <div id="app">
        <div id="home-tab" class="tab-content">
            <div class="top-bar"><b>MeetZone</b></div>
            <div id="home-feed"></div>
        </div>

        <div id="search-tab" class="tab-content">
            <div style="padding:15px;"><input id="search-input" placeholder="Search..." style="width:100%; padding:10px; border-radius:10px; background:#262626; color:white; border:none;"></div>
            <div id="search-results"></div>
        </div>

        <div id="profile-tab" class="tab-content">
            <div style="padding:20px; display:flex; align-items:center; gap:20px;">
                <img id="main-pfp" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
                <div style="display:flex; flex:1; justify-content:space-around; text-align:center;">
                    <div><b id="follower-count">0</b><br>Followers</div>
                    <div><b id="following-count">0</b><br>Following</div>
                </div>
            </div>
            <div style="padding:0 15px;">
                <b id="user-display"></b>
                <div id="profile-action-btn" style="margin-top:10px;"></div>
            </div>
            <div id="profile-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:2px; margin-top:20px;"></div>
        </div>

        <div id="chat-tab" class="tab-content">
            <div class="top-bar">
                <span onclick="showTab('profile-tab', activeChatUser)" style="cursor:pointer; margin-right:15px;">⬅️</span>
                <b id="chat-header-name">Chat</b>
            </div>
            <div id="chat-messages"></div>
            <div class="chat-input-box">
                <input id="chat-input" placeholder="Type a message...">
                <button onclick="sendMessage()" style="background:none; border:none; color:var(--blue); font-weight:bold; padding:0 15px;">Send</button>
            </div>
        </div>

        <div class="nav">
            <span onclick="showTab('home-tab')">🏠</span>
            <span onclick="showTab('search-tab')">🔍</span>
            <span onclick="showTab('profile-tab')">👤</span>
        </div>
    </div>
</body>
</html>
