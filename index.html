<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetZone | Social App</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDoc, updateDoc, arrayUnion, arrayRemove, where, limit, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = localStorage.getItem('MeetZoneUser') || "";
        let activeChatUser = "";

        // --- NAVIGATION ---
        window.showTab = (t, targetUser = null) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(t).style.display = 'flex';
            
            if(t === 'home-tab') loadHomeFeed();
            if(t === 'search-tab') setupSearch();
            if(t === 'profile-tab') loadProfile(targetUser || currentUser);
            if(t === 'inbox-tab') loadInbox();
        }

        // --- SEARCH SYSTEM ---
        function setupSearch() {
            const input = document.getElementById('search-input');
            const resDiv = document.getElementById('search-results');
            input.oninput = async () => {
                const val = input.value.trim().toLowerCase();
                if(!val) { resDiv.innerHTML = ""; return; }
                const q = query(collection(db, "users"), where("username", ">=", val), where("username", "<=", val + '\uf8ff'), limit(10));
                onSnapshot(q, (snap) => {
                    resDiv.innerHTML = "";
                    snap.forEach(d => {
                        const u = d.data();
                        resDiv.innerHTML += `<div class="user-row" onclick="showTab('profile-tab', '${u.username}')">
                            <img src="${u.pfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"> <b>${u.username}</b>
                        </div>`;
                    });
                });
            }
        }

        // --- CHAT SYSTEM ---
        window.openChat = (target) => {
            activeChatUser = target;
            document.getElementById('chat-header-name').innerText = target;
            showTab('chat-view-tab');
            const chatID = [currentUser, target].sort().join("_");
            const q = query(collection(db, "chats", chatID, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('msg-box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    box.innerHTML += `<div class="msg ${m.sender === currentUser ? 'sent' : 'received'}">${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendMsg = async () => {
            const inp = document.getElementById('msg-input');
            if(!inp.value.trim()) return;
            const chatID = [currentUser, activeChatUser].sort().join("_");
            await addDoc(collection(db, "chats", chatID, "messages"), { text: inp.value, sender: currentUser, timestamp: serverTimestamp() });
            await addDoc(collection(db, "notifications"), { to: activeChatUser, from: currentUser, text: inp.value });
            inp.value = "";
        }

        // --- NOTIFICATIONS ---
        function listenNotifications() {
            const q = query(collection(db, "notifications"), where("to", "==", currentUser));
            onSnapshot(q, (snap) => {
                snap.docChanges().forEach(async (change) => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        if(activeChatUser !== data.from) {
                            const toast = document.getElementById('toast');
                            toast.innerText = `${data.from}: ${data.text}`;
                            toast.style.display = 'block';
                            setTimeout(() => toast.style.display = 'none', 3000);
                        }
                        await deleteDoc(doc(db, "notifications", change.doc.id));
                    }
                });
            });
        }

        // --- PROFILE ---
        async function loadProfile(user) {
            onSnapshot(doc(db, "users", user), (snap) => {
                const d = snap.data();
                document.getElementById('p-img').src = d.pfp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                document.getElementById('p-name').innerText = d.username;
                document.getElementById('f-count').innerText = (d.followers || []).length;
                document.getElementById('fg-count').innerText = (d.following || []).length;
                
                const btnArea = document.getElementById('p-btns');
                if(user === currentUser) {
                    btnArea.innerHTML = `<button class="btn">Edit Profile</button>`;
                } else {
                    const isF = (d.followers || []).includes(currentUser);
                    btnArea.innerHTML = `
                        <button class="btn ${isF ? '' : 'blue'}" onclick="toggleFollow('${user}')">${isF ? 'Following' : 'Follow'}</button>
                        <button class="btn" onclick="openChat('${user}')">Message</button>`;
                }
            });
        }

        window.toggleFollow = async (t) => {
            const myR = doc(db, "users", currentUser), tR = doc(db, "users", t);
            const s = await getDoc(myR);
            const isF = (s.data().following || []).includes(t);
            await updateDoc(myR, { following: isF ? arrayRemove(t) : arrayUnion(t) });
            await updateDoc(tR, { followers: isF ? arrayRemove(currentUser) : arrayUnion(currentUser) });
        }

        window.onload = () => { if(currentUser) { showTab('home-tab'); listenNotifications(); } }
    </script>

    <style>
        :root { --bg: #000; --txt: #fff; --brd: #262626; --blue: #0095f6; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--txt); overflow: hidden; }
        
        .tab-content { display: none; flex-direction: column; height: 100vh; padding-bottom: 70px; }
        .top-bar { padding: 15px; border-bottom: 1px solid var(--brd); display: flex; align-items: center; justify-content: space-between; font-weight: bold; }
        
        /* Nav Bar */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px; background: #000; border-top: 1px solid var(--brd); z-index: 100; }
        .nav-item { font-size: 22px; cursor: pointer; }

        /* Buttons */
        .btn { flex: 1; padding: 8px; border-radius: 8px; border: none; font-weight: bold; background: #363636; color: white; cursor: pointer; }
        .blue { background: var(--blue); }

        /* Search Results */
        .user-row { display: flex; align-items: center; padding: 10px 15px; gap: 15px; cursor: pointer; }
        .user-row img { width: 45px; height: 45px; border-radius: 50%; }

        /* Chat UI */
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; margin: 5px; font-size: 14px; }
        .sent { align-self: flex-end; background: var(--blue); }
        .received { align-self: flex-start; background: #262626; }
        
        #toast { position: fixed; top: 10px; width: 90%; left: 5%; background: var(--blue); padding: 12px; border-radius: 12px; display: none; z-index: 200; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="home-tab" class="tab-content">
        <div class="top-bar">MeetZone <span onclick="alert('Post feature coming soon!')">➕</span></div>
        <div style="flex:1; display:flex; align-items:center; justify-content:center; color:gray;">Welcome to your feed!</div>
    </div>

    <div id="search-tab" class="tab-content">
        <div style="padding:15px;"><input id="search-input" placeholder="Search friends..." style="width:100%; padding:10px; border-radius:10px; background:#262626; color:white; border:none; outline:none;"></div>
        <div id="search-results" style="overflow-y:auto;"></div>
    </div>

    <div id="inbox-tab" class="tab-content">
        <div class="top-bar">Messages</div>
        <div style="padding:20px; color:gray; text-align:center;">Search a friend to start chatting!</div>
    </div>

    <div id="chat-view-tab" class="tab-content">
        <div class="top-bar"><span onclick="showTab('search-tab')">⬅️</span> <span id="chat-header-name">Chat</span> <span></span></div>
        <div id="msg-box" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; padding:15px;"></div>
        <div style="padding:10px; display:flex; gap:10px; background:#111; border-top:1px solid #222;">
            <input id="msg-input" placeholder="Message..." style="flex:1; padding:12px; border-radius:25px; background:#000; color:#fff; border:1px solid #333; outline:none;">
            <button onclick="sendMsg()" style="color:var(--blue); background:none; border:none; font-weight:bold; padding:0 10px;">Send</button>
        </div>
    </div>

    <div id="profile-tab" class="tab-content">
        <div style="padding:20px; display:flex; align-items:center; gap:25px;">
            <img id="p-img" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
            <div style="display:flex; flex:1; justify-content:space-around; text-align:center;">
                <div><b id="f-count">0</b><br><small>Followers</small></div>
                <div><b id="fg-count">0</b><br><small>Following</small></div>
            </div>
        </div>
        <div style="padding:0 20px;"><b id="p-name" style="font-size:18px;"></b><div id="p-btns" style="display:flex; gap:10px; margin-top:15px;"></div></div>
    </div>

    <div id="setting-tab" class="tab-content">
        <div class="top-bar">Settings</div>
        <div style="padding:20px;">
            <div onclick="localStorage.clear(); location.reload();" style="color:#ff4d4d; padding:15px; background:#111; border-radius:10px; text-align:center; cursor:pointer; font-weight:bold;">Log Out</div>
        </div>
    </div>

    <div class="nav">
        <span class="nav-item" onclick="showTab('home-tab')">🏠</span>
        <span class="nav-item" onclick="showTab('search-tab')">🔍</span>
        <span class="nav-item" onclick="showTab('inbox-tab')">💬</span>
        <span class="nav-item" onclick="showTab('profile-tab')">👤</span>
        <span class="nav-item" onclick="showTab('setting-tab')">⚙️</span>
    </div>

</body>
</html>
