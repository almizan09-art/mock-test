<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Online Exam Portal</title>
    <style>
        /* CSS Section - Keeping your original styles */
        :root {
            --primary: #2563eb;
            --secondary: #f8fafc;
            --accent: #10b981;
            --danger: #ef4444;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text);
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 550px;
            transition: all 0.3s ease;
        }

        h2 { color: var(--primary); text-align: center; margin-top: 0; }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--primary); }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        button:hover { background: #1d4ed8; transform: translateY(-2px); }

        .subject-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .sub-btn { background: #4b5563; }
        .sub-btn:hover { background: var(--accent); }
    </style>
</head>
<body>

    <div id="login-view" class="card">
        <h2>Student Portal</h2>
        <p style="text-align: center; color: #64748b;">Enter your name to start the session</p>
        <input type="text" id="student-name" placeholder="Enter Full Name">
        <button onclick="goToDashboard()">Start Test Session</button>
    </div>

    <div id="dashboard-view" class="card" style="display:none;">
        <h2 id="welcome-text">Select Subject</h2>
        <div class="subject-grid">
            <button class="sub-btn" onclick="startTest('Physics')">Physics (Mix Test)</button>
            <button class="sub-btn" onclick="startTest('Chemistry')">Chemistry (Mix Test)</button>
            <button class="sub-btn" onclick="startTest('Biology')">Biology (Mix Test)</button>
        </div>
    </div>

    <script>
        // JS Logic to handle the views
        function goToDashboard() {
            const nameInput = document.getElementById('student-name').value;
            
            if (nameInput.trim() === "") {
                alert("Please enter your name first!");
                return;
            }

            // Save name for later use
            localStorage.setItem('studentName', nameInput);
            
            // UI Switch
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            
            // Personalize welcome message
            document.getElementById('welcome-text').innerText = "Welcome, " + nameInput + "! Select Subject";
        }

        function startTest(subject) {
            alert("Starting " + subject + " test for " + localStorage.getItem('studentName'));
            // Yahan aap apna exam logic ya next screen add kar sakte hain
        }
    </script>

</body>
</html>
