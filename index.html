<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetZone | Social App</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDoc, updateDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = localStorage.getItem('MeetZoneUser') || "";

        // --- LOGIN & SIGNUP ---
        window.handleAuth = async function() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if (user.length < 3) return alert("Username invalid!");
            
            try {
                const userRef = doc(db, "users", user);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    if (userSnap.data().password === pass) { loginSuccess(user); }
                    else { alert("Galat Password!"); }
                } else {
                    await setDoc(userRef, { 
                        username: user, password: pass, bio: "New to MeetZone", pfp: "",
                        followersCount: 0, followingCount: 0 
                    });
                    loginSuccess(user);
                }
            } catch (err) { alert("Error: " + err.message); }
        }

        function loginSuccess(user) {
            localStorage.setItem('MeetZoneUser', user);
            location.reload();
        }

        // --- TAB NAVIGATION ---
        window.showTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            const target = document.getElementById(t);
            if(target) target.style.display = 'flex';
            
            if(t === 'home-tab') loadHomeFeed();
            if(t === 'profile-tab') loadProfile();
            if(t === 'search-tab') {
                setTimeout(() => document.getElementById('search-input').focus(), 150);
            }
        }

        // --- POSTING ---
        window.openPostModal = () => document.getElementById('post-modal').style.display = 'flex';
        window.closePostModal = () => document.getElementById('post-modal').style.display = 'none';

        window.submitPost = async () => {
            const url = document.getElementById('post-url').value.trim();
            const caption = document.getElementById('post-caption').value.trim();
            if(!url) return alert("URL zaroori hai!");
            
            await addDoc(collection(db, "posts"), {
                username: currentUser, content: url, caption: caption, timestamp: serverTimestamp()
            });
            closePostModal();
            showTab('profile-tab');
        }

        function loadHomeFeed() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('home-feed');
                feed.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    feed.innerHTML += `
                        <div class="post-card">
                            <div class="post-header"><b>${data.username}</b></div>
                            <img src="${data.content}" class="post-media" onerror="this.style.display='none'">
                            <div class="post-info"><b>${data.username}</b> ${data.caption}</div>
                        </div>`;
                });
            });
        }

        async function loadProfile() {
            const snap = await getDoc(doc(db, "users", currentUser));
            if(!snap.exists()) return;
            const data = snap.data();
            const pfpUrl = data.pfp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            
            document.getElementById('top-left-pfp').src = pfpUrl;
            document.getElementById('main-pfp').src = pfpUrl;
            document.getElementById('prof-name-title').innerText = data.username;
            document.getElementById('user-display').innerText = data.username;
            document.getElementById('prof-bio').innerText = data.bio || "";
            document.getElementById('follower-count').innerText = data.followersCount || 0;
            document.getElementById('following-count').innerText = data.followingCount || 0;

            const q = query(collection(db, "posts"), where("username", "==", currentUser));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('profile-grid');
                grid.innerHTML = "";
                document.getElementById('post-count').innerText = snap.size;
                snap.forEach(d => {
                    grid.innerHTML += `<div class="grid-item"><img src="${d.data().content}"></div>`;
                });
            });
        }

        window.saveProfile = async () => {
            const bio = prompt("Enter new Bio:");
            const pfp = prompt("Enter Profile Picture URL:");
            if(bio || pfp) {
                await updateDoc(doc(db, "users", currentUser), { bio: bio || "", pfp: pfp || "" });
                loadProfile();
            }
        }

        // Start App
        window.onload = () => { 
            if(currentUser) { 
                document.getElementById('auth').style.display='none'; 
                document.getElementById('app').style.display='block'; 
                showTab('home-tab'); 
            } else {
                document.getElementById('auth').style.display='block';
            }
        }
    </script>
    <style>
        :root { --insta-bg: #000; --text: #fff; --gray: #a8a8a8; --border: #262626; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background-color: var(--insta-bg); color: var(--text); }
        
        /* Auth Screen */
        #auth { padding: 80px 30px; text-align: center; display: none; }
        #auth input { width: 100%; padding: 12px; margin: 10px 0; background: #121212; border: 1px solid var(--border); color: white; border-radius: 5px; }
        
        /* App Layout */
        .top-bar { position: sticky; top:0; background: black; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border); z-index: 10; }
        .top-left-profile { display: flex; align-items: center; gap: 10px; }
        .top-left-profile img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }

        /* Search Section */
        .search-container { padding: 10px 15px; width: 100%; }
        .search-box { display: flex; align-items: center; background: #262626; border-radius: 8px; padding: 8px 12px; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 16px; }

        /* Profile Layout */
        .profile-head { padding: 15px; display: flex; align-items: center; gap: 20px; }
        #main-pfp { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        .stats { display: flex; flex: 1; justify-content: space-around; text-align: center; }
        .stat-num { font-weight: bold; font-size: 17px; display: block; }
        .stat-label { font-size: 12px; color: var(--gray); }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 10px; }
        .grid-item { aspect-ratio: 1/1; background: #111; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #121212; padding: 20px; border-radius: 12px; width: 100%; border: 1px solid var(--border); }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px; background: black; border-top: 0.5px solid var(--border); }
        .nav-item { font-size: 24px; cursor: pointer; }
        .tab-content { display: none; flex-direction: column; padding-bottom: 70px; }

        .post-card { border-bottom: 0.5px solid var(--border); margin-bottom: 10px; }
        .post-media { width: 100%; }
        .post-info { padding: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="auth">
        <h1 style="font-style: italic; font-size: 45px; margin-bottom: 20px;">MeetZone</h1>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="handleAuth()" style="width:100%; padding:12px; background:#0095f6; color:white; border:none; border-radius:5px; font-weight:bold;">Log In</button>
    </div>

    <div id="app" style="display:none;">
        <div class="top-bar">
            <div class="top-left-profile">
                <img id="top-left-pfp" src="">
                <span id="prof-name-title" style="font-weight:700; font-size:20px;">MeetZone</span>
            </div>
            <span style="font-size: 28px; cursor: pointer;" onclick="openPostModal()">+</span>
        </div>

        <div id="post-modal" class="modal">
            <div class="modal-box">
                <h3 style="margin-bottom:15px;">New Post</h3>
                <input id="post-url" placeholder="Paste Image URL" style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff;">
                <textarea id="post-caption" placeholder="Caption..." style="width:100%; background:#000; border:1px solid #333; color:#fff; padding:10px;"></textarea>
                <button onclick="submitPost()" style="width:100%; padding:10px; background:#0095f6; color:white; border:none; margin-top:10px;">Post Now</button>
                <p onclick="closePostModal()" style="text-align:center; color:gray; margin-top:15px; cursor:pointer;">Cancel</p>
            </div>
        </div>

        <div id="home-tab" class="tab-content">
            <div id="home-feed"></div>
        </div>

        <div id="search-tab" class="tab-content">
            <div class="search-container">
                <div class="search-box">
                    <span style="color:gray; margin-right:8px;">🔍</span>
                    <input id="search-input" type="text" placeholder="Search">
                </div>
            </div>
            <div style="text-align:center; margin-top:50px; color:gray;">Start searching for friends</div>
        </div>

        <div id="profile-tab" class="tab-content">
            <div class="profile-head">
                <img id="main-pfp" src="">
                <div class="stats">
                    <div><span class="stat-num" id="post-count">0</span><span class="stat-label">posts</span></div>
                    <div><span class="stat-num" id="follower-count">0</span><span class="stat-label">followers</span></div>
                    <div><span class="stat-num" id="following-count">0</span><span class="stat-label">following</span></div>
                </div>
            </div>
            <div style="padding: 0 15px 15px;">
                <b id="user-display">username</b><br>
                <span id="prof-bio">biology...</span>
            </div>
            <div style="display:flex; gap:10px; padding:0 15px;">
                <button class="edit-btn" onclick="saveProfile()">Edit profile</button>
                <button class="edit-btn">Share profile</button>
            </div>
            <div class="grid-container" id="profile-grid"></div>
        </div>

        <div class="nav">
            <span class="nav-item" onclick="showTab('home-tab')">🏠</span>
            <span class="nav-item" onclick="showTab('search-tab')">🔍</span>
            <span class="nav-item" onclick="openPostModal()">➕</span>
            <span class="nav-item" onclick="showTab('profile-tab')">👤</span>
            <span class="nav-item" onclick="if(confirm('Logout?')) { localStorage.clear(); location.reload(); }">⚙️</span>
        </div>
    </div>
</body>
</html>
