<!DOCTYPE html>
<html>
<head>
<title>Mock Test Platform</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  width: 700px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

#timer {
  color: #22c55e;
  font-size: 18px;
}

.option {
  background: #334155;
  margin: 10px;
  padding: 10px;
  border-radius: 5px;
  cursor: pointer;
}

.selected {
  background: #22c55e;
}

.palette {
  display: flex;
  flex-wrap: wrap;
}

.palette div {
  width: 30px;
  height: 30px;
  margin: 5px;
  background: gray;
  text-align: center;
  cursor: pointer;
}

.answered {
  background: green;
}

button {
  padding: 10px;
  margin: 5px;
}
</style>

</head>

<body>

<div class="container">

<h2>Mock Test</h2>
<div id="timer">Time: 120</div>

<h3 id="question"></h3>
<div id="options"></div>

<div>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="submit()">Submit</button>
</div>

<h3>Question Palette</h3>
<div class="palette" id="palette"></div>

<h2 id="result"></h2>

</div>

<script>
const questions = [
{
q:"What is the unit of electric charge?",
o:["Volt","Ampere","Coulomb","Ohm"],
a:2
},
{
q:"What do like charges do?",
o:["Attract","Repel","Ignore","Combine"],
a:1
},
{
q:"What is the charge of an electron?",
o:["Positive","Negative","Neutral","None"],
a:1
},
{
q:"What is the SI unit of current?",
o:["Volt","Ampere","Ohm","Watt"],
a:1
},
{
q:"Who discovered electron?",
o:["Newton","J.J. Thomson","Einstein","Bohr"],
a:1
}
];

let current = 0;
let answers = [];
let time = 120;

function loadQ() {
let q = questions[current];
document.getElementById("question").innerText = q.q;

let html="";
q.o.forEach((opt,i)=>{
let sel = answers[current]==i?"selected":"";
html += `<div class="option ${sel}" onclick="select(${i})">${opt}</div>`;
});
document.getElementById("options").innerHTML = html;
updatePalette();
}

function select(i){
answers[current]=i;
loadQ();
}

function next(){
if(current<questions.length-1){current++;loadQ();}
}

function prev(){
if(current>0){current--;loadQ();}
}

function submit(){
let score=0;
questions.forEach((q,i)=>{
if(answers[i]==q.a) score++;
});
document.getElementById("result").innerText =
"Score: "+score+"/"+questions.length;
}

function createPalette(){
let p="";
questions.forEach((q,i)=>{
p+=`<div onclick="jump(${i})" id="p${i}">${i+1}</div>`;
});
document.getElementById("palette").innerHTML=p;
}

function updatePalette(){
questions.forEach((q,i)=>{
let box=document.getElementById("p"+i);
if(answers[i]!=undefined){
box.classList.add("answered");
}
});
}

function jump(i){
current=i;
loadQ();
}

setInterval(()=>{
time--;
document.getElementById("timer").innerText="Time: "+time;
if(time<=0) submit();
},1000);

createPalette();
loadQ();
</script>

</body>
</html>
