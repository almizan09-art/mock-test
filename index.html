<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaClone</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = localStorage.getItem('chatUser') || "";

        // Tab Switching Logic
        window.showTab = function(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(tabName).style.display = 'block';
        }

        window.loginUser = async function() {
            const user = document.getElementById('username').value.trim();
            if (user.length < 3) return alert("ID choti hai!");
            await setDoc(doc(db, "users", user), { username: user, lastSeen: serverTimestamp() });
            currentUser = user;
            localStorage.setItem('chatUser', user);
            location.reload(); 
        }

        // Initialize if logged in
        window.onload = () => {
            if(currentUser) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                showTab('home-tab');
            }
        }
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background: #fff; color: #262626; }
        
        /* Navigation Bars */
        .top-nav { height: 50px; border-bottom: 1px solid #dbdbdb; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: sticky; top: 0; background: #fff; z-index: 10; }
        .bottom-nav { height: 50px; border-top: 1px solid #dbdbdb; display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; background: #fff; }
        
        /* Content Area */
        .content { padding: 10px; margin-bottom: 60px; }
        .tab-content { display: none; }

        /* Story Circle */
        .story-bar { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; border-bottom: 1px solid #efefef; }
        .story { width: 65px; height: 65px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); padding: 2px; flex-shrink: 0; }
        .story img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid white; background: #eee; }

        /* Post Style */
        .post { margin-top: 15px; border-bottom: 1px solid #efefef; padding-bottom: 15px; }
        .post-header { display: flex; align-items: center; gap: 10px; padding: 10px 0; font-weight: bold; }
        .post-img { width: 100%; aspect-ratio: 1/1; background: #fafafa; border: 1px solid #efefef; display: flex; align-items: center; justify-content: center; }

        /* Buttons */
        .nav-icon { font-size: 24px; cursor: pointer; text-decoration: none; color: black; }
        .search-bar { width: 100%; padding: 8px; border: none; background: #efefef; border-radius: 8px; margin-bottom: 15px; }
        
        #auth-screen { padding: 50px; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        input.login-input { padding: 12px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 5px; background: #fafafa; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="font-family: 'Billabong', cursive; font-size: 40px;">Instagram</h1><br>
        <input type="text" id="username" class="login-input" placeholder="Username">
        <button onclick="loginUser()" style="background:#0095f6; color:white; border:none; padding:10px; border-radius:5px; font-weight:bold;">Log In</button>
    </div>

    <div id="main-app" style="display:none;">
        <div class="top-nav">
            <span style="font-weight:bold; font-size:20px;">Instagram</span>
            <div class="nav-icons">
                <span onclick="alert('No Notifications')" style="margin-right:15px;">❤️</span>
                <span onclick="showTab('chat-tab')">💬</span>
            </div>
        </div>

        <div class="content">
            <div id="home-tab" class="tab-content">
                <div class="story-bar">
                    <div class="story"><img src=""></div>
                    <div class="story"><img src=""></div>
                    <div class="story"><img src=""></div>
                    <div class="story"><img src=""></div>
                </div>
                <div class="post">
                    <div class="post-header">👤 User_123</div>
                    <div class="post-img">Photo Area</div>
                    <div style="padding:10px 0;">❤️ 💬 ✈️</div>
                    <div><b>User_123</b> Awesome vibe! #coding</div>
                </div>
            </div>

            <div id="search-tab" class="tab-content">
                <input type="text" class="search-bar" placeholder="Search users...">
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:2px;">
                    <div style="background:#eee; aspect-ratio:1/1;"></div>
                    <div style="background:#eee; aspect-ratio:1/1;"></div>
                    <div style="background:#eee; aspect-ratio:1/1;"></div>
                </div>
            </div>

            <div id="video-tab" class="tab-content">
                <div style="height:80vh; background:black; color:white; display:flex; align-items:center; justify-content:center;">
                    Reels Video Player
                </div>
            </div>

            <div id="chat-tab" class="tab-content">
                <h3>Direct Messages</h3>
                <p>Chat feature yahan load hoga...</p>
            </div>
        </div>

        <div class="bottom-nav">
            <span class="nav-icon" onclick="showTab('home-tab')">🏠</span>
            <span class="nav-icon" onclick="showTab('search-tab')">🔍</span>
            <span class="nav-icon" onclick="alert('Post Photo Clicked')">➕</span>
            <span class="nav-icon" onclick="showTab('video-tab')">🎬</span>
            <span class="nav-icon" onclick="alert('Profile Page')">👤</span>
        </div>
    </div>

</body>
</html>
