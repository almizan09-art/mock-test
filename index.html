<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Online Exam Portal</title>
    <style>
        /* CSS Section */
        :root {
            --primary: #2563eb;
            --secondary: #f8fafc;
            --accent: #10b981;
            --danger: #ef4444;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text);
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 550px;
            transition: all 0.3s ease;
        }

        h2 { color: var(--primary); text-align: center; margin-top: 0; }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--primary); }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        button:hover { background: #1d4ed8; transform: translateY(-2px); }

        .subject-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .sub-btn { background: #4b5563; }
        .sub-btn:hover { background: var(--accent); }

        .exam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        #timer { color: var(--danger); font-weight: bold; font-size: 1.2rem; }

        .question-item {
            background: var(--secondary);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .option-label {
            display: block;
            padding: 10px;
            margin: 8px 0;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-label:hover { background: #f1f5f9; border-color: var(--primary); }

        .result-score {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            text-align: center;
            margin: 20px 0;
        }

        .action-btns { display: flex; gap: 10px; flex-direction: column; }
        .wa-btn { background: #25D366; }
        .wa-btn:hover { background: #128C7E; }
    </style>
</head>
<body>

    <div id="login-view" class="card">
        <h2>Student Portal</h2>
        <p style="text-align: center; color: #64748b;">Enter your name to start the session</p>
        <input type="text" id="student-name" placeholder="Full Name">
        <button onclick="goToDashboard()">Start Test Session</button>
    </div>

    <div id="dashboard-view" class="card" style="display:none;">
        <h2>Select Subject</h2>
        <div class="subject-grid">
            <button class="sub-btn" onclick="startTest('Physics')">Physics (Mix Test)</button>
            <button class="sub-btn" onclick="startTest('Chemistry')">Chemistry (Mix Test)</button>
            <button class="sub-btn" onclick="startTest('Biology')">Biology (Mix Test)</button>
        </div>
    </div>

    <div id="exam-view" class="card" style="display:none; max-width: 700px;">
        <div class="exam-header">
            <h3 id="display-subject">Subject</h3>
