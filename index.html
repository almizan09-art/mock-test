<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaChat Fixed</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = "";
        let chatWith = "";

        // LOGIN FUNCTION
        window.loginUser = async function() {
            const userField = document.getElementById('username');
            const user = userField.value.trim();
            
            if (user.length < 3) {
                alert("Username thoda bada rakho (min 3 chars)");
                return;
            }

            try {
                currentUser = user;
                localStorage.setItem('chatUser', user);
                
                // Database mein user save karna
                await setDoc(doc(db, "users", user), { 
                    username: user, 
                    lastActive: serverTimestamp() 
                });

                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('friend-list-screen').style.display = 'block';
                loadUsers();
            } catch (err) {
                console.error(err);
                alert("Firebase Error: " + err.message + "\n\nTip: Check if Firestore Rules are set to 'true'");
            }
        }

        // LOAD USERS
        function loadUsers() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                const list = document.getElementById('users-list');
                list.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.username !== currentUser) {
                        const div = document.createElement('div');
                        div.className = 'user-card';
                        div.innerHTML = `<span>👤 ${data.username}</span> <button onclick="startChat('${data.username}')">Message</button>`;
                        list.appendChild(div);
                    }
                });
            });
        }

        window.startChat = function(friend) {
            chatWith = friend;
            document.getElementById('friend-list-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'grid';
            document.getElementById('chat-header').innerText = friend;
            loadMessages();
        }

        window.sendMsg = async function() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            const chatId = [currentUser, chatWith].sort().join("_");
            await addDoc(collection(db, "chats", chatId, "messages"), {
                text: text,
                sender: currentUser,
                timestamp: serverTimestamp()
            });
            input.value = "";
        }

        function loadMessages() {
            const chatId = [currentUser, chatWith].sort().join("_");
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const chatBox = document.getElementById('chat-msgs');
                chatBox.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMe = data.sender === currentUser;
                    chatBox.innerHTML += `<div class="msg ${isMe ? 'sent' : 'received'}">${data.text}</div>`;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        window.goBack = () => {
            document.getElementById('chat-screen').style.display = 'none';
            document.getElementById('friend-list-screen').style.display = 'block';
        }
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background: #fafafa; display: flex; justify-content: center; height: 100vh; }
        .app-container { width: 100%; max-width: 400px; height: 100vh; background: white; border: 1px solid #dbdbdb; position: relative; }
        
        /* Auth */
        #auth-screen { padding: 50px 20px; text-align: center; }
        .logo { font-size: 32px; font-weight: bold; margin-bottom: 30px; display: block; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 5px; background: #fafafa; }
        .btn-login { width: 100%; padding: 12px; background: #0095f6; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Friend List */
        .user-card { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #efefef; }
        .user-card button { background: #0095f6; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }

        /* Chat */
        #chat-screen { display: none; height: 100%; grid-template-rows: 60px 1fr 70px; }
        .header { display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #dbdbdb; font-weight: bold; gap: 10px; }
        .messages { padding: 15px; overflow-y: auto; background: #fff; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 75%; font-size: 14px; }
        .sent { align-self: flex-end; background: #0095f6; color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #efefef; color: black; border-bottom-left-radius: 2px; }
        .input-box { display: flex; padding: 10px; border-top: 1px solid #dbdbdb; align-items: center; }
        .input-box input { margin-bottom: 0; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="auth-screen">
            <span class="logo">InstaChat</span>
            <input type="text" id="username" placeholder="Username">
            <button class="btn-login" onclick="loginUser()">Log In</button>
        </div>

        <div id="friend-list-screen" style="display:none;">
            <div style="padding:15px; font-weight:bold; border-bottom:1px solid #dbdbdb;">Suggested for you</div>
            <div id="users-list"></div>
        </div>

        <div id="chat-screen">
            <div class="header">
                <button onclick="goBack()" style="background:none; border:none; color:#0095f6; font-size:20px; cursor:pointer;">←</button>
                <span id="chat-header">User</span>
            </div>
            <div class="messages" id="chat-msgs"></div>
            <div class="input-box">
                <input type="text" id="msg-input" placeholder="Message...">
                <button onclick="sendMsg()" style="background:none; border:none; color:#0095f6; font-weight:bold; margin-left:10px; cursor:pointer;">Send</button>
            </div>
        </div>
    </div>
</body>
</html>
