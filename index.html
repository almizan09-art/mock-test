<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetZone | WhatsApp Style</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config (Images se liya gaya sahi config)
        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = localStorage.getItem('MeetZoneUser') || "";
        let activeChat = "";

        // Login Logic
        window.handleAuth = async function() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if(!user || !pass) return alert("Pehle details bharo!");

            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);

            if(userSnap.exists()) {
                if(userSnap.data().password === pass) { loginOk(user); }
                else { alert("Galat Password!"); }
            } else {
                await setDoc(userRef, { username: user, password: pass, friends: [] });
                loginOk(user);
            }
        }

        function loginOk(u) { localStorage.setItem('MeetZoneUser', u); location.reload(); }

        // Navigation Controls
        window.showTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(t).style.display = 'block';
        }

        // WhatsApp Style Chat
        window.openChat = (friend) => {
            activeChat = friend;
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('chat-user-name').innerText = friend;
            loadMessages();
        }

        window.closeChat = () => {
            document.getElementById('chat-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }

        window.logout = () => {
            if(confirm("Logout karna chahte hain?")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.sendMsg = async () => {
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;
            const chatId = [currentUser, activeChat].sort().join("_");
            await addDoc(collection(db, "chats", chatId, "messages"), {
                text: input.value, sender: currentUser, time: serverTimestamp()
            });
            input.value = "";
        }

        function loadMessages() {
            const chatId = [currentUser, activeChat].sort().join("_");
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("time", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const isMe = d.data().sender === currentUser;
                    const time = d.data().time ? new Date(d.data().time.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                    box.innerHTML += `
                        <div class="msg-row ${isMe?'me':'you'}">
                            <div class="bubble">
                                ${d.data().text}
                                <span class="time">${time}</span>
                            </div>
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.onload = () => { if(currentUser) { document.getElementById('auth').style.display='none'; document.getElementById('main-app').style.display='block'; showTab('home-tab'); } }
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        :root { --wa-green: #075e54; --wa-teal: #128c7e; --wa-light: #dcf8c6; --wa-bg: #e5ddd5; }
        
        /* Login Screen */
        #auth { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; padding: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-p { width: 100%; padding: 12px; background: var(--wa-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Main App Header */
        .header { background: var(--wa-green); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .tab-content { padding: 15px; padding-bottom: 80px; }

        /* WhatsApp Chat Window */
        #chat-screen { display: none; flex-direction: column; height: 100vh; background: var(--wa-bg); position: fixed; top: 0; width: 100%; z-index: 100; }
        .chat-head { background: var(--wa-green); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 12px; }
        .chat-box { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        /* Bubbles */
        .msg-row { display: flex; width: 100%; }
        .me { justify-content: flex-end; }
        .you { justify-content: flex-start; }
        .bubble { padding: 6px 12px; border-radius: 8px; max-width: 75%; position: relative; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .me .bubble { background: var(--wa-light); border-top-right-radius: 0; }
        .you .bubble { background: white; border-top-left-radius: 0; }
        .time { font-size: 10px; color: #888; display: block; text-align: right; margin-top: 4px; }

        /* Input Area */
        .chat-input { background: #f0f0f0; padding: 8px 12px; display: flex; align-items: center; gap: 10px; }
        .chat-input input { flex: 1; border: none; border-radius: 25px; padding: 10px 15px; margin: 0; }
        .send-btn { background: var(--wa-teal); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }

        /* Bottom Navigation */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #ddd; font-size: 22px; }
        
        /* Settings List */
        .s-item { background: white; padding: 15px; margin-bottom: 8px; border-radius: 10px; display: flex; align-items: center; gap: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="auth">
        <h1 style="color:var(--wa-green); margin-bottom: 20px;">MeetZone</h1>
        <input id="username" placeholder="Phone Number / Username">
        <input id="password" type="password" placeholder="Password">
        <button class="btn-p" onclick="handleAuth()">LOGIN / SIGNUP</button>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <span style="font-size: 20px; font-weight: bold;">MeetZone</span>
            <div style="display: flex; gap: 20px;">🔍 ⋮</div>
        </div>

        <div id="home-tab" class="tab-content">
            <div style="background: white; padding: 15px; border-radius: 10px; text-align: center;">
                <h3>Welcome to WhatsApp Style Chat!</h3>
                <p>Niche dosto ke icon 👥 par click karein.</p>
                <br>
                <button onclick="openChat('mizan09')" style="background:var(--wa-teal); color:white; padding:10px 20px; border:none; border-radius:20px;">Chat with mizan09</button>
            </div>
        </div>

        <div id="search-tab" class="tab-content" style="display:none;">
            <h3>Find Friends</h3>
            <p>New friends search logic goes here...</p>
        </div>

        <div id="settings-tab" class="tab-content" style="display:none;">
            <h3 style="margin-bottom: 15px;">Settings</h3>
            <div class="s-item">👤 Profile Info</div>
            <div class="s-item">🔒 Privacy & Security</div>
            <div class="s-item">💬 Chat Backup</div>
            <button onclick="logout()" style="background:#e74c3c; color:white; width:100%; padding:15px; border:none; border-radius:10px; margin-top:20px; font-weight:bold;">LOGOUT FROM DEVICE</button>
        </div>

        <div class="nav">
            <span onclick="showTab('home-tab')">💬</span>
            <span onclick="showTab('search-tab')">🔍</span>
            <span onclick="showTab('settings-tab')">⚙️</span>
        </div>
    </div>

    <div id="chat-screen">
        <div class="chat-head">
            <span onclick="closeChat()" style="cursor: pointer; font-size: 22px;">←</span>
            <div style="width: 38px; height: 38px; background: #ddd; border-radius: 50%;"></div>
            <div>
                <b id="chat-user-name" style="display: block;">User</b>
                <span style="font-size: 11px; opacity: 0.9;">online</span>
            </div>
        </div>
        <div class="chat-box" id="chat-box"></div>
        <div class="chat-input">
            <span style="font-size: 20px; color: #555;">📎</span>
            <input type="text" id="msg-input" placeholder="Type a message">
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

</body>
</html>
