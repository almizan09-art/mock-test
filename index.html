<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetZone | Notifications</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDoc, updateDoc, arrayUnion, where, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = localStorage.getItem('MeetZoneUser') || "";
        let activeChat = "";
        let unsubscribeMsgs = null;

        // --- GLOBAL NOTIFICATION TRACKER ---
        function listenForNotifications() {
            onSnapshot(doc(db, "users", currentUser), (snap) => {
                const friends = snap.data()?.friends || [];
                let totalUnread = 0;

                friends.forEach(f => {
                    const chatId = [currentUser, f].sort().join("_");
                    const q = query(collection(db, "chats", chatId, "messages"), orderBy("time", "desc"), limit(1));
                    
                    onSnapshot(q, (msgSnap) => {
                        msgSnap.forEach(d => {
                            if (d.data().sender !== currentUser && activeChat !== f) {
                                document.getElementById('notif-dot').style.display = 'block';
                                // Yahan hum UI mein "1 new message" dikhane ka logic handle karenge
                                const friendItem = document.getElementById(`status-${f}`);
                                if(friendItem) friendItem.innerText = "1 new message";
                            }
                        });
                    });
                });
            });
        }

        window.handleAuth = async function() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if (user.length < 3) return alert("Username invalid!");
            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                if (userSnap.data().password === pass) { loginSuccess(user); }
                else { alert("Galat Password!"); }
            } else {
                await setDoc(userRef, { username: user, password: pass, friends: [] });
                loginSuccess(user);
            }
        }

        function loginSuccess(user) {
            localStorage.setItem('MeetZoneUser', user);
            location.reload();
        }

        window.showTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(t).style.display = 'flex';
            if(t === 'friend-tab') {
                document.getElementById('notif-dot').style.display = 'none';
                loadFriends();
            }
            if(t === 'search-tab') loadUsers();
        }

        window.addFriend = async function(f) {
            await updateDoc(doc(db, "users", currentUser), { friends: arrayUnion(f) });
            await updateDoc(doc(db, "users", f), { friends: arrayUnion(currentUser) });
            showTab('friend-tab');
        }

        function loadFriends() {
            onSnapshot(doc(db, "users", currentUser), (snap) => {
                const list = document.getElementById('friend-list');
                list.innerHTML = "";
                snap.data()?.friends?.forEach(f => {
                    list.innerHTML += `
                        <div class="card" onclick="openChat('${f}')">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <div class="avatar">👤</div>
                                <div>
                                    <div style="font-weight:600">${f}</div>
                                    <div id="status-${f}" style="font-size:12px; color:var(--insta-blue)">Tap to chat</div>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        window.openChat = (f) => {
            activeChat = f;
            document.getElementById('chat-title').innerText = f;
            const statusEl = document.getElementById(`status-${f}`);
            if(statusEl) statusEl.innerText = "Tap to chat";
            showTab('chat-box');
            loadMsgs();
        }

        function loadMsgs() {
            if(unsubscribeMsgs) unsubscribeMsgs();
            const chatId = [currentUser, activeChat].sort().join("_");
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("time", "asc"));
            unsubscribeMsgs = onSnapshot(q, (snap) => {
                const box = document.getElementById('msgs');
                box.innerHTML = "";
                snap.forEach(d => {
                    const isMe = d.data().sender === currentUser;
                    box.innerHTML += `<div class="msg-wrapper ${isMe?'me-wrap':'you-wrap'}"><div class="msg-bubble ${isMe?'me':'you'}">${d.data().text}</div></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendMsg = async () => {
            const input = document.getElementById('m-input');
            if(!input.value.trim()) return;
            const chatId = [currentUser, activeChat].sort().join("_");
            const text = input.value;
            input.value = "";
            await addDoc(collection(db, "chats", chatId, "messages"), { text, sender: currentUser, time: serverTimestamp() });
        }

        window.onload = () => { 
            if(currentUser) { 
                document.getElementById('auth').style.display='none'; 
                document.getElementById('app').style.display='block'; 
                showTab('home-tab');
                listenForNotifications();
            } 
        }
    </script>
    <style>
        :root { --insta-blue: #0095f6; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px; background: white; border-top: 1px solid #dbdbdb; }
        .nav-item { position: relative; font-size: 24px; cursor: pointer; }
        .dot { position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; background: red; border-radius: 50%; display: none; border: 2px solid white; }
        .tab-content { display: none; flex-direction: column; padding: 15px; padding-bottom: 80px; }
        .card { padding: 12px; display: flex; align-items: center; justify-content: space-between; border-radius: 10px; cursor: pointer; }
        .card:active { background: #f0f0f0; }
        .avatar { width: 45px; height: 45px; background: #eee; border-radius: 50%; display: grid; place-items: center; }
        #msgs { height: 70vh; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .msg-wrapper { display: flex; margin-bottom: 5px; }
        .me-wrap { justify-content: flex-end; }
        .msg-bubble { padding: 10px 15px; border-radius: 20px; max-width: 75%; font-size: 14px; }
        .me { background: var(--insta-blue); color: white; }
        .you { background: #efefef; }
        .chat-input { position: fixed; bottom: 70px; width: 90%; left: 5%; display: flex; background: white; border: 1px solid #ddd; border-radius: 25px; padding: 5px 15px; }
        input { border: none; padding: 10px; width: 100%; outline: none; }
    </style>
</head>
<body>
    <div id="auth" style="padding:50px; text-align:center;">
        <h2>MeetZone</h2>
        <input id="username" placeholder="Username"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button onclick="handleAuth()" style="width:100%; padding:10px; background:var(--insta-blue); color:white; border:none; border-radius:5px;">Log In</button>
    </div>

    <div id="app" style="display:none;">
        <div style="padding:15px; border-bottom:1px solid #ddd; font-weight:bold; font-size:18px;">MeetZone <span id="chat-title" style="float:right; color:var(--insta-blue)"></span></div>
        
        <div id="home-tab" class="tab-content"><h3 style="text-align:center; margin-top:50px;">Welcome Back!</h3></div>
        <div id="search-tab" class="tab-content"><h3>Find Friends</h3><div id="search-list"></div></div>
        <div id="friend-tab" class="tab-content"><h3>Messages</h3><div id="friend-list"></div></div>
        
        <div id="chat-box" class="tab-content">
            <div id="msgs"></div>
            <div class="chat-input">
                <input id="m-input" placeholder="Message...">
                <button onclick="sendMsg()" style="background:none; border:none; color:var(--insta-blue); font-weight:bold;">Send</button>
            </div>
        </div>

        <div class="nav">
            <span class="nav-item" onclick="showTab('home-tab')">🏠</span>
            <span class="nav-item" onclick="showTab('search-tab')">🔍</span>
            <span class="nav-item" onclick="showTab('friend-tab')">💬<div id="notif-dot" class="dot"></div></span>
            <span class="nav-item" onclick="localStorage.clear(); location.reload();">⚙️</span>
        </div>
    </div>
</body>
</html>
