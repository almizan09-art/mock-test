<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Online Exam Portal</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #f8fafc;
            --accent: #10b981;
            --danger: #ef4444;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; color: var(--text);
        }

        .card {
            background: white; padding: 2.5rem; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 95%; max-width: 700px; max-height: 90vh; overflow-y: auto;
        }

        h2 { color: var(--primary); text-align: center; margin-top: 0; }

        input[type="text"] {
            width: 100%; padding: 15px; margin: 20px 0; box-sizing: border-box;
            border: 2px solid #e2e8f0; border-radius: 10px; outline: none; font-size: 1rem;
        }

        button {
            background: var(--primary); color: white; border: none;
            padding: 12px; border-radius: 10px; cursor: pointer;
            font-weight: 600; width: 100%; transition: 0.3s; font-size: 1rem;
        }

        button:hover { background: #1d4ed8; transform: translateY(-2px); }

        .subject-grid { display: grid; gap: 15px; margin-top: 20px; }
        .sub-btn { background: #4b5563; }
        .sub-btn:hover { background: var(--accent); }

        #timer { color: var(--danger); font-weight: bold; font-size: 1.2rem; }
        .question-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .question { margin: 20px 0; font-size: 1.1rem; font-weight: bold; min-height: 60px; line-height: 1.5; }
        .options-container { display: flex; flex-direction: column; gap: 10px; }
        .option-item {
            padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px;
            cursor: pointer; transition: 0.2s; background: #fff;
        }
        .option-item:hover { background: #f1f5f9; }
        .option-item.selected { background: #d1fae5; border-color: #10b981; font-weight: bold; }

        .nav-btns { display: flex; gap: 10px; margin-top: 25px; }
        
        .result-box { text-align: center; }
        .score-text { font-size: 2.5rem; color: var(--accent); font-weight: bold; margin: 10px 0; }
        
        .review-section { margin-top: 30px; text-align: left; border-top: 2px solid #eee; padding-top: 20px; }
        .review-item { 
            padding: 15px; border-radius: 10px; margin-bottom: 15px; 
            border-left: 5px solid #ccc; background: #f9fafb;
        }
        .review-item.correct { border-left-color: var(--accent); background: #f0fdf4; }
        .review-item.wrong { border-left-color: var(--danger); background: #fef2f2; }
        
        .status-badge { 
            display: inline-block; padding: 2px 8px; border-radius: 4px; 
            font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;
        }
        .correct .status-badge { background: var(--accent); color: white; }
        .wrong .status-badge { background: var(--danger); color: white; }
    </style>
</head>
<body>

    <div id="login-view" class="card">
        <h2>Student Portal</h2>
        <input type="text" id="student-name" placeholder="Enter Full Name">
        <button onclick="goToDashboard()">Start Session</button>
    </div>

    <div id="dashboard-view" class="card" style="display:none;">
        <h2 id="welcome-text">Select Subject</h2>
        <div class="subject-grid">
            <button class="sub-btn" onclick="startTest('Physics')">Physics (20 Questions)</button>
            <button class="sub-btn" onclick="startTest('Chemistry')">Chemistry (20 Questions)</button>
            <button class="sub-btn" onclick="startTest('Biology')">Biology (45 Questions)</button>
        </div>
    </div>

    <div id="exam-view" class="card" style="display:none;">
        <div class="question-meta">
            <span id="q-count" style="font-weight: bold;">Question 1</span>
            <div id="timer">10:00</div>
        </div>
        <hr>
        <div class="question" id="q-text">Loading...</div>
        <div class="options-container" id="options-box"></div>
        
        <div class="nav-btns">
            <button id="next-btn" onclick="nextQuestion()">Next Question</button>
            <button id="submit-btn" onclick="submitExam()" style="display:none; background: var(--accent);">Submit Final Test</button>
        </div>
    </div>

    <div id="result-view" class="card" style="display:none;">
        <div class="result-box">
            <h2>Exam Completed!</h2>
            <p id="res-name" style="font-size: 1.2rem; font-weight: 500;"></p>
            <p id="res-subject" style="color: var(--primary); font-weight: bold;"></p>
            <p id="res-percent" style="font-size: 1.1rem; margin-top: 10px;"></p>
            <div class="score-text" id="res-score">0 / 0</div>
            
            <button onclick="location.reload()" style="margin-top:20px;">Restart Portal</button>

            <div class="review-section">
                <h3>Answer Review</h3>
                <div id="review-list"></div>
            </div>
        </div>
    </div>

    <script>
        let currentQIndex = 0;
        let score = 0;
        let userAnswers = [];
        let timerInterval;
        let timeLeft = 0; 
        let currentSubject = "";
        let currentQuestions = [];

        const questionsData = {
            'Physics': [
                { q: "What is the correct relation between electric field intensity (E) and potential (V)?", a: "B", opts: ["E = dV/dr", "E = -dV/dr", "V = dE/dr", "V = -dE/dr"] },
                { q: "The capacitance of a capacitor does NOT depend on:", a: "D", opts: ["Shape of the plates", "Size of the plates", "Medium between the plates", "Charge on the plates"] },
                { q: "What is the SI unit of resistance?", a: "C", opts: ["Ampere", "Volt", "Ohm (Ω)", "Watt"] },
                { q: "Kirchhoff’s second law (Loop Rule) is based on the conservation of:", a: "C", opts: ["Charge", "Momentum", "Energy", "Mass"] },
                { q: "What is the SI unit of magnetic flux?", a: "B", opts: ["Tesla", "Weber", "Gauss", "Henry"] },
                { q: "Lenz’s Law is based on which principle?", a: "A", opts: ["Conservation of energy", "Conservation of charge", "Conservation of mass", "Conservation of momentum"] },
                { q: "A transformer works on the principle of:", a: "B", opts: ["Self-induction", "Mutual induction", "Eddy currents", "Total internal reflection"] },
                { q: "The speed of light is maximum in:", a: "C", opts: ["Glass", "Water", "Vacuum", "Air"] },
                { q: "What is the formula of Brewster’s Law?", a: "C", opts: ["μ = sin(iₚ)", "μ = cos(iₚ)", "μ = tan(iₚ)", "μ = cot(iₚ)"] },
                { q: "What is the correct formula for De Broglie wavelength?", a: "A", opts: ["λ = h/mv", "λ = hv/m", "λ = m/hv", "λ = hm/v"] },
                { q: "Who proposed the 'Plum Pudding Model' of the atom?", a: "C", opts: ["Rutherford", "Bohr", "J.J. Thomson", "Dalton"] },
                { q: "In a P-type semiconductor, the majority charge carriers are:", a: "B", opts: ["Electrons", "Holes", "Neutrons", "Protons"] },
                { q: "Which electromagnetic wave has the highest frequency?", a: "B", opts: ["UV rays", "Gamma rays", "X-rays", "Radio waves"] },
                { q: "What is the mirror formula?", a: "B", opts: ["1/f = 1/v - 1/u", "1/f = 1/v + 1/u", "f = u + v", "f = uv"] },
                { q: "The shining (brilliance) of a diamond is due to:", a: "C", opts: ["Interference", "Diffraction", "Total internal reflection", "Refraction"] },
                { q: "Who discovered the photoelectric effect?", a: "B", opts: ["Einstein", "Hertz", "Newton", "Maxwell"] },
                { q: "Which series of the hydrogen spectrum lies in the visible region?", a: "B", opts: ["Lyman series", "Balmer series", "Paschen series", "Pfund series"] },
                { q: "What is the Boolean expression of a NOR gate?", a: "C", opts: ["Y = A + B", "Y = A · B", "Y = (A + B)̅", "Y = (A · B)̅"] },
                { q: "Binding energy per nucleon is maximum for:", a: "C", opts: ["Helium", "Uranium", "Iron (Fe)", "Oxygen"] },
                { q: "What is the unit of power of a lens?", a: "B", opts: ["Meter", "Dioptre (D)", "Candela", "Watt"] }
            ],
            'Chemistry': [
                { q: "What is the unit of 'Molarity'?", a: "A", opts: ["mol/L", "mol/kg", "g/L", "No unit"] },
                { q: "What is the total number of Bravais lattices?", a: "B", opts: ["7", "14", "12", "9"] },
                { q: "Which gas is used in a fuel cell?", a: "C", opts: ["N₂", "O₂", "H₂", "CO₂"] },
                { q: "What is the unit of rate constant for a zero-order reaction?", a: "C", opts: ["s⁻¹", "L·mol⁻¹·s⁻¹", "mol·L⁻¹·s⁻¹", "mol·L⁻¹"] },
                { q: "The process of adsorption is:", a: "B", opts: ["Endothermic", "Exothermic", "Isothermal", "None of these"] },
                { q: "Mond’s process is used for the purification of which metal?", a: "C", opts: ["Cu", "Zn", "Ni", "Fe"] },
                { q: "Which substance is known as the 'King of Chemicals'?", a: "C", opts: ["HCl", "HNO₃", "H₂SO₄", "H₃PO₄"] },
                { q: "What is the general electronic configuration of d-block elements?", a: "B", opts: ["(n-1)d ns", "(n-1)d¹⁻¹⁰ ns¹⁻²", "nd ns", "nd¹⁰ ns²"] },
                { q: "What is the coordination number of Co in [Co(en)₃]³⁺?", a: "C", opts: ["3", "4", "6", "2"] },
                { q: "What is the nature of the C–X bond in haloalkanes?", a: "C", opts: ["Purely covalent", "Ionic", "Polar covalent", "Non-polar"] },
                { q: "What is formed when phenol is heated with zinc dust?", a: "A", opts: ["Benzene", "Toluene", "Benzaldehyde", "Zinc oxide"] },
                { q: "Lucas Reagent is a mixture of:", a: "A", opts: ["HCl + anhydrous ZnCl₂", "HNO₃ + H₂SO₄", "Pd/BaSO₄", "NaCl + ZnCl₂"] },
                { q: "Fehling’s solution test is NOT given by which compound?", a: "C", opts: ["Methanal", "Ethanal", "Benzaldehyde", "Propanal"] },
                { q: "What is the nature of amines?", a: "B", opts: ["Acidic", "Basic", "Neutral", "Amphoteric"] },
                { q: "What is the chemical name of Vitamin C?", a: "B", opts: ["Retinol", "Ascorbic acid", "Calciferol", "Thiamine"] },
                { q: "Bakelite is an example of:", a: "C", opts: ["Elastomer", "Thermoplastic", "Thermosetting polymer", "Fiber"] },
                { q: "Aspirin is used as a:", a: "B", opts: ["Antibiotic", "Antipyretic/Analgesic", "Antiseptic", "Antacid"] },
                { q: "Copper matte mainly contains:", a: "A", opts: ["Cu₂S + FeS", "Cu₂O + FeO", "CuS + Cu₂O", "FeS + SiO₂"] },
                { q: "Which base is NOT found in DNA?", a: "C", opts: ["Adenine", "Guanine", "Uracil", "Thymine"] },
                { q: "Fog is which type of colloidal system?", a: "B", opts: ["Gas in liquid", "Liquid in gas", "Solid in gas", "Liquid in liquid"] }
            ],
            'Biology': [
                { q: "The oxygen released during photosynthesis comes from:", a: "B", opts: ["CO₂", "H₂O", "Glucose", "Chlorophyll"] },
                { q: "Which blood group is called universal donor?", a: "D", opts: ["A", "B", "AB", "O"] },
                { q: "Which part of brain controls balance?", a: "B", opts: ["Cerebrum", "Cerebellum", "Medulla", "Hypothalamus"] },
                { q: "The unit of heredity is:", a: "B", opts: ["Cell", "Gene", "Chromosome", "DNA"] }
                // Yahan baki questions data aap dal sakte hain
            ]
        };

        function goToDashboard() {
            const nameInput = document.getElementById('student-name');
            const name = nameInput.value.trim();
            if (name === "") return alert("Please enter your name!");
            
            localStorage.setItem('studentName', name);
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('welcome-text').innerText = "Welcome, " + name;
        }

        function startTest(subject) {
            currentSubject = subject;
            currentQuestions = questionsData[subject];
            currentQIndex = 0;
            score = 0;
            userAnswers = Array(currentQuestions.length).fill(null);
            
            timeLeft = (subject === 'Biology') ? 1500 : 600; 
            
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('exam-view').style.display = 'block';
            
            startTimer();
            displayQuestion();
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitExam();
                    return;
                }
                let min = Math.floor(timeLeft / 60);
                let sec = timeLeft % 60;
                document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                timeLeft--;
            }, 1000);
        }

        function displayQuestion() {
            const currentQ = currentQuestions[currentQIndex];
            document.getElementById('q-count').innerText = `Question ${currentQIndex + 1}/${currentQuestions.length}`;
            document.getElementById('q-text').innerText = currentQ.q;
            
            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';
            
            currentQ.opts.forEach((opt, index) => {
                const char = String.fromCharCode(65 + index);
                const div = document.createElement('div');
                div.className = 'option-item' + (userAnswers[currentQIndex] === char ? ' selected' : '');
                div.innerText = `${char}) ${opt}`;
                div.onclick = () => selectOption(div, char);
                optionsBox.appendChild(div);
            });

            document.getElementById('next-btn').style.display = (currentQIndex === currentQuestions.length - 1) ? 'none' : 'block';
            document.getElementById('submit-btn').style.display = (currentQIndex === currentQuestions.length - 1) ? 'block' : 'none';
        }

        function selectOption(el, char) {
            document.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            userAnswers[currentQIndex] = char;
        }

        function nextQuestion() {
            if(!userAnswers[currentQIndex]) return alert("Please select an answer!");
            currentQIndex++;
            displayQuestion();
        }

        function submitExam() {
            if(timeLeft > 0 && !userAnswers[currentQIndex]) return alert("Please select an answer before submitting!");
            
            clearInterval(timerInterval);
            score = 0;
            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = '';

            currentQuestions.forEach((q, i) => {
                const isCorrect = (userAnswers[i] === q.a);
                if(isCorrect) score++;

                const reviewDiv = document.createElement('div');
                reviewDiv.className = `review-item ${isCorrect ? 'correct' : 'wrong'}`;
                
                const userChoiceIndex = userAnswers[i] ? userAnswers[i].charCodeAt(0) - 65 : -1;
                const correctChoiceIndex = q.a.charCodeAt(0) - 65;

                reviewDiv.innerHTML = `
                    <span class="status-badge">${isCorrect ? 'CORRECT' : 'WRONG'}</span>
                    <p style="margin:5px 0"><strong>Q${i+1}:</strong> ${q.q}</p>
                    <p style="margin:2px 0; color: ${isCorrect ? 'green' : 'red'}">Your Answer: ${userAnswers[i] || 'Not Attempted'} ${userChoiceIndex >= 0 ? '- ' + q.opts[userChoiceIndex] : ''}</p>
                    ${!isCorrect ? `<p style="margin:2px 0; color: green">Correct Answer: ${q.a} - ${q.opts[correctChoiceIndex]}</p>` : ''}
                `;
                reviewList.appendChild(reviewDiv);
            });

            document.getElementById('exam-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            document.getElementById('res-name').innerText = "Student: " + localStorage.getItem('studentName');
            document.getElementById('res-subject').innerText = "Subject: " + currentSubject;
            document.getElementById('res-percent').innerText = `Success Rate: ${((score/currentQuestions.length)*100).toFixed(2)}%`;
            document.getElementById('res-score').innerText = `${score} / ${currentQuestions.length}`;
        }
    </script>
</body>
</html>
