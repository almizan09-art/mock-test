<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaChat Pro</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = "";
        let chatWith = "";

        window.loginUser = async function() {
            const user = document.getElementById('username').value.trim();
            if (user.length < 3) return alert("User ID 3 characters se badi honi chahiye!");
            
            try {
                // User ko database mein register karna
                await setDoc(doc(db, "users", user), { username: user, lastSeen: serverTimestamp() });
                currentUser = user;
                localStorage.setItem('chatUser', user);
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('friend-list-screen').style.display = 'block';
                loadUsers();
            } catch (e) {
                alert("Database Error: " + e.message + "\n\nTip: Make sure you enabled Firestore in Test Mode!");
            }
        }

        function loadUsers() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                const list = document.getElementById('users-list');
                list.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.username !== currentUser) {
                        const div = document.createElement('div');
                        div.className = 'user-card';
                        div.innerHTML = `<span>👤 ${data.username}</span> <button onclick="startChat('${data.username}')">Message</button>`;
                        list.appendChild(div);
                    }
                });
            });
        }

        window.startChat = function(friend) {
            chatWith = friend;
            document.getElementById('friend-list-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'grid';
            document.getElementById('chat-header').innerText = "Chat with " + friend;
            loadMessages();
        }

        window.sendMsg = async function() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            const chatId = [currentUser, chatWith].sort().join("_");
            await addDoc(collection(db, "chats", chatId, "messages"), {
                text: input.value, sender: currentUser, timestamp: serverTimestamp()
            });
            input.value = "";
        }

        function loadMessages() {
            const chatId = [currentUser, chatWith].sort().join("_");
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const chatBox = document.getElementById('chat-msgs');
                chatBox.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMe = data.sender === currentUser;
                    chatBox.innerHTML += `<div class="msg ${isMe ? 'sent' : 'received'}">${data.text}</div>`;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }
        window.goBack = () => { document.getElementById('chat-screen').style.display = 'none'; document.getElementById('friend-list-screen').style.display = 'block'; }
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: #fafafa; display: flex; justify-content: center; height: 100vh; }
        .container { width: 100%; max-width: 400px; height: 100vh; background: white; border: 1px solid #dbdbdb; }
        #auth-screen { padding: 50px 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dbdbdb; border-radius: 4px; }
        button.login-btn { width: 100%; padding: 12px; background: #0095f6; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .user-card { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #efefef; }
        .user-card button { background: #0095f6; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        #chat-screen { display: none; height: 100%; grid-template-rows: 60px 1fr 70px; }
        .messages { padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 15px; max-width: 75%; font-size: 14px; }
        .sent { align-self: flex-end; background: #0095f6; color: white; }
        .received { align-self: flex-start; background: #efefef; }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-screen">
            <h1 style="margin-bottom:20px;">InstaChat</h1>
            <input type="text" id="username" placeholder="Username">
            <button class="login-btn" onclick="loginUser()">Log In</button>
        </div>
        <div id="friend-list-screen" style="display:none;">
            <div style="padding:15px; font-weight:bold; border-bottom:1px solid #dbdbdb;">Suggested for you</div>
            <div id="users-list"></div>
        </div>
        <div id="chat-screen">
            <div style="padding:15px; border-bottom:1px solid #dbdbdb; font-weight:bold; display:flex; gap:10px;">
                <button onclick="goBack()" style="border:none; background:none; color:#0095f6; cursor:pointer;">←</button>
                <span id="chat-header">Chat</span>
            </div>
            <div class="messages" id="chat-msgs"></div>
            <div style="padding:15px; display:flex; border-top:1px solid #dbdbdb;">
                <input type="text" id="msg-input" placeholder="Message..." style="margin:0;">
                <button onclick="sendMsg()" style="border:none; background:none; color:#0095f6; font-weight:bold; margin-left:10px;">Send</button>
            </div>
        </div>
    </div>
</body>
</html>
