<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetZone</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        // File upload ke liye Storage import karna hoga jab aap billing setup kar lenge
        
        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = localStorage.getItem('MeetZoneUser') || "";

        // LOGIN & REGISTRATION WITH PASSWORD
        window.handleAuth = async function() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            
            if (user.length < 3 || pass.length < 4) return alert("Username (min 3) aur Password (min 4) sahi se bharein!");

            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                // Login check
                if (userSnap.data().password === pass) {
                    loginSuccess(user);
                } else {
                    alert("Galat Password!");
                }
            } else {
                // Naya account banana
                await setDoc(userRef, { username: user, password: pass, friends: [] });
                loginSuccess(user);
            }
        }

        function loginSuccess(user) {
            localStorage.setItem('MeetZoneUser', user);
            location.reload();
        }

        window.showTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(t).style.display = 'block';
            if(t === 'search-tab') loadAllUsers();
        }

        // FIND FRIENDS
        function loadAllUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('user-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    if(d.id !== currentUser) {
                        list.innerHTML += `<div class="user-item">
                            <span>👤 ${d.id}</span>
                            <button onclick="startChat('${d.id}')">Add Friend & Chat</button>
                        </div>`;
                    }
                });
            });
        }

        window.onload = () => {
            if(currentUser) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('my-name').innerText = currentUser;
                showTab('home-tab');
            }
        }
    </script>
    <style>
        :root { --primary: #8e44ad; } /* MeetZone Purple Theme */
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        #auth-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f4f4f4; }
        .login-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* App Layout */
        .header { background: white; padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; font-weight: bold; color: var(--primary); font-size: 20px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #ddd; }
        .tab-content { padding: 20px; margin-bottom: 70px; }
        .user-item { display: flex; justify-content: space-between; background: #f9f9f9; padding: 15px; margin-bottom: 10px; border-radius: 8px; align-items: center; }
        .user-item button { width: auto; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="login-box">
            <h1 style="color: var(--primary);">MeetZone</h1>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleAuth()">Login / Register</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <span>MeetZone</span>
            <span id="my-name" style="font-size: 14px; color: #666;"></span>
        </div>

        <div id="home-tab" class="tab-content">
            <h3>Feed</h3>
            <p>Welcome to MeetZone! Niche search icon se friends banayein.</p>
        </div>

        <div id="search-tab" class="tab-content" style="display:none;">
            <h3>Find Friends</h3>
            <div id="user-list"></div>
        </div>

        <div id="reels-tab" class="tab-content" style="display:none;">
            <h3>MeetZone Reels</h3>
            <div style="height: 300px; background: #000; border-radius: 10px; color: white; display: flex; align-items: center; justify-content: center;">
                Video Player (Requires Storage Setup)
            </div>
        </div>

        <div class="bottom-nav">
            <span onclick="showTab('home-tab')">🏠</span>
            <span onclick="showTab('search-tab')">🔍</span>
            <span onclick="alert('Post feature coming soon!')">➕</span>
            <span onclick="showTab('reels-tab')">🎬</span>
            <span onclick="localStorage.clear(); location.reload();">🚪</span>
        </div>
    </div>

</body>
</html>
