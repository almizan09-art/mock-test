<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaChat - Live Application</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🔥 Aapka Firebase Connection Config (Maine aapki photo se copy kiya hai)
        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "333166164284",
            appId: "1:333166164284:web:e398869c9b74989679f2d1"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FUNCTIONS ---

        // 1. Login Function
        window.loginUser = function() {
            const user = document.getElementById('username').value;
            if (user.length < 3) return alert("Username kam se kam 3 letters ka hona chahiye!");
            
            localStorage.setItem('chatUser', user);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';
            loadMessages();
        }

        // 2. Send Message to Firebase
        window.sendMsg = async function() {
            const text = document.getElementById('msg-input').value;
            const sender = localStorage.getItem('chatUser');
            
            if (text.trim() === "") return;

            try {
                await addDoc(collection(db, "messages"), {
                    text: text,
                    user: sender,
                    timestamp: serverTimestamp()
                });
                document.getElementById('msg-input').value = ""; // Clear input
            } catch (e) {
                alert("Error! Kya aapne Firestore Rules 'true' kiye hain? " + e);
            }
        }

        // 3. Load Messages in Real-time
        function loadMessages() {
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const chatBox = document.getElementById('chat-msgs');
                chatBox.innerHTML = ""; // Clear box
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMe = data.user === localStorage.getItem('chatUser');
                    
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `msg ${isMe ? 'sent' : 'received'}`;
                    msgDiv.innerHTML = `<small style="font-size:10px; opacity:0.7;">${data.user}</small><br>${data.text}`;
                    chatBox.appendChild(msgDiv);
                });
                chatBox.scrollTop = chatBox.scrollHeight; // Auto scroll to bottom
            });
        }

        // Enter key se send karne ke liye
        window.handleKeyPress = function(e) {
            if (e.key === 'Enter') sendMsg();
        }
    </script>

    <style>
        /* CSS Styling - Instagram Theme */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Auth Screen */
        #auth-screen { text-align: center; background: white; border: 1px solid #dbdbdb; padding: 40px; width: 350px; border-radius: 3px; }
        #auth-screen h2 { margin-bottom: 20px; font-weight: 300; font-size: 30px; }
        #auth-screen input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; }
        #auth-screen button { width: 100%; padding: 10px; background: #0095f6; color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }

        /* Main App Area */
        #main-app { display: none; width: 100%; max-width: 450px; height: 90vh; background: white; border: 1px solid #dbdbdb; grid-template-rows: 60px 1fr 70px; border-radius: 8px; overflow: hidden; }
        .header { display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #dbdbdb; font-weight: bold; font-size: 18px; }
        .messages { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fff; }
        
        /* Message Bubbles */
        .msg { padding: 10px 15px; border-radius: 20px; max-width: 75%; font-size: 14px; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: #0095f6; color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #efefef; color: black; border-bottom-left-radius: 2px; }

        /* Input Bar */
        .input-area { display: flex; align-items: center; padding: 10px 20px; border-top: 1px solid #dbdbdb; gap: 10px; }
        .input-area input { flex: 1; border: 1px solid #dbdbdb; padding: 10px 15px; border-radius: 25px; outline: none; }
        .input-area button { color: #0095f6; background: none; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2>InstaChat</h2>
        <input type="text" id="username" placeholder="Phone number, username, or email">
        <button onclick="loginUser()">Log In</button>
        <p style="margin-top: 20px; font-size: 12px; color: #8e8e8e;">This is a global chat room.</p>
    </div>

    <div id="main-app">
        <div class="header">Chat Room</div>
        <div class="messages" id="chat-msgs">
            </div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMsg()">Send</button>
        </div>
    </div>

</body>
</html>
