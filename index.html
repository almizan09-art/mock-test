<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Online Exam Portal</title>
    <style>
        :root { --primary: #2563eb; --secondary: #f8fafc; --accent: #10b981; --danger: #ef4444; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; color: var(--text); }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 95%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        input[type="text"] { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #1d4ed8; transform: translateY(-2px); }
        .subject-grid { display: grid; gap: 15px; margin-top: 20px; }
        .sub-btn { background: #4b5563; }
        .sub-btn:hover { background: var(--accent); }
        #timer { color: var(--danger); font-weight: bold; font-size: 1.2rem; }
        .question-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .question { margin: 20px 0; font-size: 1.1rem; font-weight: bold; min-height: 60px; line-height: 1.4; }
        .options-container { display: flex; flex-direction: column; gap: 10px; }
        .option-item { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer; transition: 0.2s; background: #fff; }
        .option-item.selected { background: #d1fae5; border-color: #10b981; font-weight: 600; }
        .nav-btns { display: flex; gap: 10px; margin-top: 25px; }
        .result-box { text-align: center; }
        .score-text { font-size: 2.5rem; color: var(--accent); font-weight: bold; margin: 10px 0; }
        .review-section { margin-top: 30px; text-align: left; border-top: 2px solid #eee; padding-top: 20px; }
        .review-item { padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #ccc; background: #f9fafb; }
        .review-item.correct { border-left-color: var(--accent); background: #f0fdf4; }
        .review-item.wrong { border-left-color: var(--danger); background: #fef2f2; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        .correct .status-badge { background: var(--accent); color: white; }
        .wrong .status-badge { background: var(--danger); color: white; }
    </style>
</head>
<body>

    <div id="login-view" class="card">
        <h2>Student Portal</h2>
        <input type="text" id="student-name" placeholder="Enter Full Name">
        <button onclick="goToDashboard()">Start Session</button>
    </div>

    <div id="dashboard-view" class="card" style="display:none;">
        <h2 id="welcome-text">Select Subject</h2>
        <div class="subject-grid">
            <button class="sub-btn" onclick="startTest('Physics')">Physics (20 Questions)</button>
            <button class="sub-btn" onclick="startTest('Chemistry')">Chemistry (20 Questions)</button>
            <button class="sub-btn" onclick="startTest('Biology')">Biology (45 Questions)</button>
        </div>
    </div>

    <div id="exam-view" class="card" style="display:none;">
        <div class="question-meta">
            <span id="q-count" style="font-weight: bold;">Question 1</span>
            <div id="timer">10:00</div>
        </div>
        <hr>
        <div class="question" id="q-text">Loading...</div>
        <div class="options-container" id="options-box"></div>
        <div class="nav-btns">
            <button id="next-btn" onclick="nextQuestion()">Next Question</button>
            <button id="submit-btn" onclick="submitExam()" style="display:none; background: var(--accent);">Submit Final Test</button>
        </div>
    </div>

    <div id="result-view" class="card" style="display:none;">
        <div class="result-box">
            <h2>Exam Completed!</h2>
            <p id="res-name" style="font-size: 1.2rem;"></p>
            <p id="res-subject" style="color: var(--primary); font-weight: bold;"></p>
            <div class="score-text" id="res-score">0 / 0</div>
            <p style="color: #666; font-size: 0.9rem;">The report is being sent to teacher at 7478471531.</p>
            <button onclick="location.reload()" style="background: #4b5563;">Restart Portal</button>
            <div class="review-section"><h3>Answer Review</h3><div id="review-list"></div></div>
        </div>
    </div>

    <script>

            ]
        };

        function goToDashboard() {
            const nameInput = document.getElementById('student-name');
            const name = nameInput.value.trim();
            if (name === "") return alert("Please enter your name!");
            localStorage.setItem('studentName', name);
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('welcome-text').innerText = "Welcome, " + name;
        }

        function startTest(subject) {
            currentSubject = subject;
            currentQuestions = questionsData[subject];
            currentQIndex = 0; score = 0;
            userAnswers = Array(currentQuestions.length).fill(null);
            timeLeft = (subject === 'Biology') ? 2700 : 900; // Bio: 45m, Others: 15m
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('exam-view').style.display = 'block';
            startTimer(); displayQuestion();
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let min = Math.floor(timeLeft / 60), sec = timeLeft % 60;
                document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if (timeLeft <= 0) { clearInterval(timerInterval); submitExam(); }
                timeLeft--;
            }, 1000);
        }

        function displayQuestion() {
            const currentQ = currentQuestions[currentQIndex];
            document.getElementById('q-count').innerText = `Question ${currentQIndex + 1}/${currentQuestions.length}`;
            document.getElementById('q-text').innerText = currentQ.q;
            const box = document.getElementById('options-box'); box.innerHTML = '';
            currentQ.opts.forEach((opt, i) => {
                const char = String.fromCharCode(65 + i);
                const div = document.createElement('div');
                div.className = 'option-item' + (userAnswers[currentQIndex] === char ? ' selected' : '');
                div.innerText = `${char}) ${opt}`;
                div.onclick = () => { document.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected')); div.classList.add('selected'); userAnswers[currentQIndex] = char; };
                box.appendChild(div);
            });
            document.getElementById('next-btn').style.display = (currentQIndex === currentQuestions.length - 1) ? 'none' : 'block';
            document.getElementById('submit-btn').style.display = (currentQIndex === currentQuestions.length - 1) ? 'block' : 'none';
        }

        function nextQuestion() {
            if(!userAnswers[currentQIndex]) return alert("Please select an answer!");
            currentQIndex++; displayQuestion();
        }

        function submitExam() {
            clearInterval(timerInterval); 
            score = 0;
            const name = localStorage.getItem('studentName');
            const list = document.getElementById('review-list'); 
            list.innerHTML = '';

            currentQuestions.forEach((q, i) => {
                const correct = (userAnswers[i] === q.a); if(correct) score++;
                const div = document.createElement('div'); div.className = `review-item ${correct ? 'correct' : 'wrong'}`;
                div.innerHTML = `<span class="status-badge">${correct ? 'CORRECT' : 'WRONG'}</span><p>Q${i+1}: ${q.q}</p><p>Ans: ${userAnswers[i] || 'None'} | Correct: ${q.a}</p>`;
                list.appendChild(div);
            });

            document.getElementById('exam-view').style.display = 'none';
