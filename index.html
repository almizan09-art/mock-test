<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetZone | Search & Profile</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDoc, updateDoc, arrayUnion, where, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = localStorage.getItem('MeetZoneUser') || "";

        window.handleAuth = async function() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if (user.length < 3) return alert("Username invalid!");
            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                if (userSnap.data().password === pass) { loginSuccess(user); }
                else { alert("Galat Password!"); }
            } else {
                await setDoc(userRef, { 
                    username: user, password: pass, friends: [], bio: "New to MeetZone", pfp: "",
                    followersCount: 0, followingCount: 0 
                });
                loginSuccess(user);
            }
        }

        function loginSuccess(user) {
            localStorage.setItem('MeetZoneUser', user);
            location.reload();
        }

        window.showTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(t).style.display = 'flex';
            
            if(t === 'home-tab') loadHomeFeed();
            if(t === 'profile-tab') loadProfile();
            
            // Search Tab logic: Focus input for keyboard
            if(t === 'search-tab') {
                const searchInput = document.getElementById('search-input');
                setTimeout(() => searchInput.focus(), 100);
            }
        }

        window.openPostModal = () => document.getElementById('post-modal').style.display = 'flex';
        window.closePostModal = () => document.getElementById('post-modal').style.display = 'none';

        window.submitPost = async () => {
            const url = document.getElementById('post-url').value.trim();
            const caption = document.getElementById('post-caption').value.trim();
            if(!url) return alert("URL zaroori hai!");
            await addDoc(collection(db, "posts"), {
                username: currentUser, content: url, caption: caption, timestamp: serverTimestamp()
            });
            closePostModal();
            showTab('profile-tab');
        }

        function loadHomeFeed() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('home-feed');
                feed.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    feed.innerHTML += `
                        <div class="post-card">
                            <div class="post-header"><b>${data.username}</b></div>
                            <img src="${data.content}" class="post-media" onerror="this.src='https://via.placeholder.com/300?text=Invalid+Image'">
                            <div class="post-info"><b>${data.username}</b> ${data.caption}</div>
                        </div>`;
                });
            });
        }

        async function loadProfile() {
            const snap = await getDoc(doc(db, "users", currentUser));
            const data = snap.data();
            const pfpUrl = data.pfp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            document.getElementById('top-left-pfp').src = pfpUrl;
            document.getElementById('main-pfp').src = pfpUrl;
            document.getElementById('prof-name-title').innerText = data.username;
            document.getElementById('user-display').innerText = data.username;
            document.getElementById('prof-bio').innerText = data.bio || "";
            document.getElementById('follower-count').innerText = data.followersCount || 0;
            document.getElementById('following-count').innerText = data.followingCount || 0;

            const q = query(collection(db, "posts"), where("username", "==", currentUser));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('profile-grid');
                grid.innerHTML = "";
                document.getElementById('post-count').innerText = snap.size;
                snap.forEach(d => {
                    grid.innerHTML += `<div class="grid-item"><img src="${d.data().content}"></div>`;
                });
            });
        }

        window.saveProfile = async () => {
            const bio = prompt("Enter new Bio:", document.getElementById('prof-bio').innerText);
            const pfp = prompt("Enter Profile Picture URL:");
            const updates = {};
            if(bio !== null) updates.bio = bio;
            if(pfp) updates.pfp = pfp;
            if(Object.keys(updates).length > 0) {
                await updateDoc(doc(db, "users", currentUser), updates);
                loadProfile();
            }
        }

        window.onload = () => { if(currentUser) { 
            document.getElementById('auth').style.display='none'; 
            document.getElementById('app').style.display='block'; 
            loadProfile();
            showTab('home-tab'); 
        } }
    </script>
    <style>
        :root { --insta-bg: #000; --text: #fff; --gray: #a8a8a8; --border: #262626; --search-bg: #262626; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background-color: var(--insta-bg); color: var(--text); overflow-x: hidden; }
        
        .top-bar { position: sticky; top:0; background: black; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border); z-index: 10; height: 50px; }
        .top-left-profile { display: flex; align-items: center; gap: 10px; }
        .top-left-profile img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }

        /* Search Section */
        .search-container { padding: 15px; width: 100%; }
        .search-box { 
            display: flex; align-items: center; background: var(--search-bg); 
            border-radius: 10px; padding: 8px 12px; border: 1px solid #363636;
        }
        .search-box input { 
            background: transparent; border: none; color: white; width: 100%; 
            font-size: 16px; outline: none; margin: 0; padding: 0;
        }

        .profile-head { padding: 20px 15px; display: flex; align-items: center; gap: 20px; }
        .pfp-container { width: 85px; height: 85px; }
        #main-pfp { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .stats { display: flex; flex: 1; justify-content: space-around; text-align: center; }
        .stat-num { font-weight: bold; font-size: 16px; display: block; }
        .stat-label { font-size: 12px; }
