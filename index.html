<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetZone | Social App</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDoc, updateDoc, arrayUnion, arrayRemove, where, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVo-BZ88zoNxCjp-GfwTI9ABe14LNGnUA",
            authDomain: "online-chat-application-80592.firebaseapp.com",
            projectId: "online-chat-application-80592",
            storageBucket: "online-chat-application-80592.appspot.com",
            messagingSenderId: "468130262659",
            appId: "1:468130262659:web:70208a13964e79fdbbf5b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = localStorage.getItem('MeetZoneUser') || "";

        // --- NAVIGATION ---
        window.showTab = (t, targetUser = null) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(t).style.display = 'flex';
            if(t === 'home-tab') loadHomeFeed();
            if(t === 'profile-tab') loadProfile(targetUser || currentUser);
            if(t === 'search-tab') setupSearch();
        }

        // --- SEARCH SYSTEM (FIXED) ---
        function setupSearch() {
            const input = document.getElementById('search-input');
            input.oninput = async () => {
                const val = input.value.trim().toLowerCase();
                const resDiv = document.getElementById('search-results');
                if(!val) { resDiv.innerHTML = ""; return; }
                
                const q = query(collection(db, "users"), where("username", ">=", val), where("username", "<=", val + '\uf8ff'), limit(10));
                onSnapshot(q, (snap) => {
                    resDiv.innerHTML = "";
                    snap.forEach(d => {
                        const u = d.data();
                        resDiv.innerHTML += `
                            <div class="user-row" onclick="showTab('profile-tab', '${u.username}')">
                                <img src="${u.pfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">
                                <b>${u.username}</b>
                            </div>`;
                    });
                });
            }
        }

        // --- FOLLOW SYSTEM (INSTAGRAM STYLE) ---
        window.toggleFollow = async (targetUser) => {
            const myRef = doc(db, "users", currentUser);
            const targetRef = doc(db, "users", targetUser);
            const targetSnap = await getDoc(targetRef);
            const mySnap = await getDoc(myRef);
            
            const isFollowing = (mySnap.data().following || []).includes(targetUser);

            if (isFollowing) {
                await updateDoc(myRef, { following: arrayRemove(targetUser) });
                await updateDoc(targetRef, { followers: arrayRemove(currentUser) });
            } else {
                await updateDoc(myRef, { following: arrayUnion(targetUser) });
                await updateDoc(targetRef, { followers: arrayUnion(currentUser) });
            }
        }

        // --- PROFILE LOADING ---
        async function loadProfile(username) {
            onSnapshot(doc(db, "users", username), (snap) => {
                if(!snap.exists()) return;
                const data = snap.data();
                const isMe = username === currentUser;
                
                document.getElementById('main-pfp').src = data.pfp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                document.getElementById('user-display').innerText = data.username;
                document.getElementById('prof-bio').innerText = data.bio || "No bio yet";
                
                // Counts
                document.getElementById('follower-count').innerText = (data.followers || []).length;
                document.getElementById('following-count').innerText = (data.following || []).length;

                // Action Button (Follow/Edit)
                const actionDiv = document.getElementById('profile-action-btn');
                if (isMe) {
                    actionDiv.innerHTML = `<button class="edit-btn">Edit Profile</button>`;
                } else {
                    const amIFollowing = (data.followers || []).includes(currentUser);
                    actionDiv.innerHTML = amIFollowing ? 
                        `<button class="edit-btn" onclick="toggleFollow('${username}')">Following</button>` :
                        `<button class="edit-btn follow-blue" onclick="toggleFollow('${username}')">Follow</button>`;
                }
            });

            // Load User Posts
            const q = query(collection(db, "posts"), where("username", "==", username), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('profile-grid');
                grid.innerHTML = "";
                document.getElementById('post-count').innerText = snap.size;
                snap.forEach(d => {
                    grid.innerHTML += `<div class="grid-item"><img src="${d.data().content}"></div>`;
                });
            });
        }

        function loadHomeFeed() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('home-feed');
                feed.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    feed.innerHTML += `
                        <div class="post-card">
                            <div class="post-header"><b>${data.username}</b></div>
                            <img src="${data.content}" class="post-media">
                            <div class="post-info"><b>${data.username}</b> ${data.caption}</div>
                        </div>`;
                });
            });
        }

        window.onload = () => { if(currentUser) showTab('home-tab'); }
    </script>
    <style>
        :root { --insta-bg: #000; --text: #fff; --gray: #a8a8a8; --border: #262626; --blue: #0095f6; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background-color: var(--insta-bg); color: var(--text); }
        
        .top-bar { position: sticky; top:0; background: black; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 10; height: 50px; }
        .search-box { background: #262626; border-radius: 10px; padding: 10px; margin: 15px; display: flex; align-items: center; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }
        
        .user-row { display: flex; align-items: center; padding: 10px 15px; gap: 15px; cursor: pointer; }
        .user-row img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }

        .profile-head { padding: 20px 15px; display: flex; align-items: center; gap: 25px; }
        #main-pfp { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        .stats { display: flex; flex: 1; justify-content: space-around; text-align: center; }
        .stat-num { font-weight: bold; font-size: 18px; display: block; }
        
        .edit-btn { width: 100%; background: #363636; color: white; border: none; padding: 8px; border-radius: 8px; font-weight: 600; margin-top: 15px; cursor: pointer; }
        .follow-blue { background: var(--blue); }

        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 20px; }
        .grid-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px; background: black; border-top: 1px solid var(--border); }
        .nav-item { font-size: 24px; cursor: pointer; }
        .tab-content { display: none; flex-direction: column; height: 100vh; overflow-y: auto; padding-bottom: 70px; }
        .post-card { border-bottom: 1px solid #111; margin-bottom: 10px; }
        .post-media { width: 100%; }
    </style>
</head>
<body>
    <div id="app">
        <div class="top-bar"><b>MeetZone</b> <span>➕</span></div>

        <div id="home-tab" class="tab-content"><div id="home-feed"></div></div>

        <div id="search-tab" class="tab-content">
            <div class="search-box">🔍 <input id="search-input" placeholder="Search"></div>
            <div id="search-results"></div>
        </div>

        <div id="profile-tab" class="tab-content">
            <div class="profile-head">
                <img id="main-pfp" src="">
                <div class="stats">
                    <div><span class="stat-num" id="post-count">0</span> posts</div>
                    <div><span class="stat-num" id="follower-count">0</span> followers</div>
                    <div><span class="stat-num" id="following-count">0</span> following</div>
                </div>
            </div>
            <div style="padding: 0 15px;">
                <b id="user-display"></b><br><span id="prof-bio"></span>
                <div id="profile-action-btn"></div>
            </div>
            <div class="grid-container" id="profile-grid"></div>
        </div>

        <div class="nav">
            <span class="nav-item" onclick="showTab('home-tab')">🏠</span>
            <span class="nav-item" onclick="showTab('search-tab')">🔍</span>
            <span class="nav-item" onclick="showTab('profile-tab')">👤</span>
        </div>
    </div>
</body>
</html>
